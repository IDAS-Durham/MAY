relationship_rules: "relationship_rules.yaml"

categories:
  - name: "Kids"
    symbol: "K"
    attribute: "age"
    type: "numerical"
    numerical:
      min: 0
      max: 17

  - name: "Young Adults"
    symbol: "YA"
    attribute: "age"
    type: "numerical"
    numerical:
      min: 18
      max: 24

  - name: "Adults"
    symbol: "A"
    attribute: "age"
    type: "numerical"
    numerical:
      min: 25
      max: 64

  - name: "Old Adults"
    symbol: "OA"
    attribute: "age"
    type: "numerical"
    numerical:
      min: 65
      max: null

demotion:
  enabled: true
  max_attempts: 10
  min_household_size: 1
  priority:
    Kids: 1
    Young Adults: 2
    Old Adults: 3
    Adults: 4
  validation_rules:
    - name: "Kids require adult supervision"
      condition:
        category: "Kids"
        operator: ">="
        value: 1
      requirement:
        category: "Adults"
        operator: ">="
        value: 1

promotion:
  enabled: true
  max_attempts: 4
  priority:
    Young Adults: 1
    Adults: 2
    Old Adults: 3
    Kids: 4
  validation_rules:
    - name: "Kids require adult supervision"
      condition:
        category: "Kids"
        operator: ">="
        value: 1
      requirement:
        category: "Adults"
        operator: ">="
        value: 1
