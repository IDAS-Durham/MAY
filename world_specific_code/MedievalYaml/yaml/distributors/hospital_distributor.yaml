distributor_name: "hospital_distributor"
venue_type: "hospital"
description: "Assign which medical facility a person will attend to when they need it"

activity_map_key: "medical_facility"

# Subset to add students to
subset_key: "patient"

eligibility:

  require_unassigned: true

venue_selection:

  consider_by: "count"

  # Count-based parameters (when consider_by = "count")
  count: 1
  criteria: "closest"  # "closest", "random", "largest_capacity"

  max_distance: 100
  max_distance_unit: "km"  # "km", "miles", "meters"

  venue_geo_level: "SGU"

  person_location_source: "geographical_unit.coordinates"

  venue_location_source: "coordinates"

  distance_metric: "haversine"  # "haversine" (great-circle), "euclidean"

  filter_by_geography: true  # Already enforced by venues_config.yaml

  # Only consider venues with available capacity
  respect_capacity: false

allocation:

  strategy: "closest"
  # Options:
  #   - "random": Randomly pick from eligible venues
  #   - "closest": Always pick closest
  #   - "proportional": Weight by inverse distance (closer = higher probability)
  #   - "capacity_weighted": Weight by available capacity
  #   - "greedy_fill": Fill schools sequentially by distance

  # What to do if capacity is missing or 0
  capacity_handling:
    if_missing: "ignore"  # "ignore" (no limit), "skip" (don't use venue), "default"
    default_capacity: 1000  # Used when if_missing = "default"
    if_zero: "ignore"  # "ignore", "skip"

  track_capacity: false

  when_full: "overflow"  # "exclude" (remove from options), "overflow" (allow over-capacity)

  overflow_behavior:
    distribute_evenly: true  # Spread overflow across all venues proportionally
    max_overflow_per_venue: null  # null = unlimited, or set a max (e.g., 1.5x capacity)

  batch_by: "geo_unit"  # "geo_unit", "none"

  batch_location_source: "centroid"

settings:
  # Execution order (higher = earlier)
  priority: 1

  # Limit number of allocations (null = no limit)
  max_allocations: null

  # Random seed for reproducibility
  random_seed: null

  # Logging
  verbose: true
  log_summary: true  # Print allocation statistics
  debug: false  # Enable debug-level logging for troubleshooting

  # Performance
  use_spatial_index: true  # Use KDTree for distance queries
  cache_venue_pools: false  # Cache eligible venues per geo_unit

# ============================================================================
# FALLBACK BEHAVIOR
# ============================================================================
# What to do when no eligible venues are found for a person?

fallback:
  strategy: "assign_closest"
  # Options:
  #   - "skip": Leave person.activity_map['primary_activity'] unassigned
  #   - "relax_distance": Increase search radius and retry
  #   - "relax_capacity": Allow over-capacity allocation
  #   - "assign_closest": Assign to closest venue regardless of constraints

  # Relaxation parameters (if strategy = "relax_distance")
  relax_params:
    max_iterations: 3
    distance_multiplier: 2.0  # Double search radius each iteration

# ============================================================================
# VALIDATION & CONSTRAINTS
# ============================================================================

validation:
  # Ensure person has required attributes before attempting allocation
  required_person_attributes:
    - "age"
    - "geographical_unit"  # Person's location (at smallest level, will traverse up if needed)

  # Ensure venues have required columns
  required_venue_columns:
    - "geo_unit"
    - "latitude"
    - "longitude"