# Household Configuration
# This file defines generic categories and rules for household composition

# Generic categories for population classification
# Each category can classify ANY attribute (age, income, education, etc.)
# Each category defines:
#   - name: Human-readable name
#   - symbol: Symbol used in composition strings (e.g., "K", "YA", "A", "OA")
#   - attribute: The entity attribute to categorize (e.g., "age", "income")
#   - type: Type of categorization ("numerical" or "categorical")
#   - numerical: (only if type is "numerical")
#       - min: Minimum value (inclusive)
#       - max: Maximum value (inclusive, null means no upper limit)
#   - categorical: (only if type is "categorical")
#       - allowed_values: List of allowed categorical values
#
# Example of future categorical type:
#   - name: "Male"
#     symbol: "M"
#     attribute: "sex"
#     type: "categorical"
#     categorical:
#       allowed_values: ["male", "m", "M"]

categories:
  - name: "Kids"
    symbol: "K"
    attribute: "age"
    type: "numerical"
    numerical:
      min: 0
      max: 11

  - name: "Young Adults"
    symbol: "YA"
    attribute: "age"
    type: "numerical"
    numerical:
      min: 12
      max: 20

  - name: "Adults"
    symbol: "A"
    attribute: "age"
    type: "numerical"
    numerical:
      min: 21
      max: null

# Composition pattern format
# Patterns follow the format: "<kids> <young_adults> <adults> <old_adults>"
# Each field can be:
#   - A number: exact count (e.g., "2")
#   - ">=N": N or more (e.g., ">=2")
#
# Example patterns:
#   "2 0 2 0"      -> exactly 2 kids, 0 young adults, 2 adults, 0 old adults
#   ">=2 >=0 2 0"  -> 2+ kids, any young adults, 2 adults, 0 old adults
#   "1 >=0 1 0"    -> 1 kid, any young adults, 1 adult, 0 old adults
#   "0 >=0 0 0"    -> singles/couples with no specific age requirement

# Demotion rules
# When there aren't enough people in a category to fill household requirements,
# we can "demote" household patterns to require fewer people.
#
# Demotion priority:
#   1. Reduce ">=N" constraints to smaller values (e.g., ">=2" -> ">=1" -> ">=0")
#   2. Reduce exact counts (e.g., "2" -> "1" -> "0")
#
# The system will automatically attempt demotions in order until it finds
# a viable household composition or exhausts all options.

demotion:
  # Enable automatic demotion when population doesn't match household data
  enabled: true

  # Maximum number of demotion attempts per household pattern
  max_attempts: 10

  # Minimum household size to attempt (households smaller than this are discarded)
  min_household_size: 1

  # Priority order for demotion (which category to demote first)
  # LOWER NUMBER = DEMOTE FIRST (when that category is scarce)
  # Strategy: Demote scarce/flexible categories first, preserve essential ones
  priority:
    Kids: 1           # Demote kids first (often scarce, flexible count)
    Young Adults: 2   # Then young adults (moderately flexible)
    Adults: 3         # Demote adults LAST (essential for supervision/stability)

  # Validation rules for demoted patterns
  # Rules define constraints that must be satisfied for a pattern to be valid
  # Each rule is evaluated during demotion, and invalid patterns are rejected
  #
  # Rule format:
  #   - condition: Defines when the rule applies
  #   - requirement: What must be true when condition is met
  #
  # Supported operators in conditions/requirements:
  #   - ">=": greater than or equal
  #   - ">": greater than
  #   - "==": equal to
  #   - "<=": less than or equal
  #   - "<": less than
  #
  # Special values:
  #   - Use category names: Kids, Young Adults, Adults, Old Adults
  #
  # Example: "If Kids >= 1, then Adults must be >= 1"
  #   This ensures children are never left without adult supervision
  validation_rules:
    - name: "Kids require adult supervision"
      description: "If there are kids in the household, there must be at least one adult"
      condition:
        category: "Kids"
        operator: ">="
        value: 1
      requirement:
        category: "Adults"
        operator: ">="
        value: 1

    # Example: Add more rules as needed
    # - name: "Old adults should have care"
    #   description: "If 2+ old adults, ensure at least 1 regular adult for care"
    #   condition:
    #     category: "Old Adults"
    #     operator: ">="
    #     value: 2
    #   requirement:
    #     category: "Adults"
    #     operator: ">="
    #     value: 1

# Promotion rules
# When there are leftover people after all allocations,
# we can "promote" existing household patterns to allow more people.
#
# Promotion converts fixed counts to flexible (>=) constraints:
#   - "0" -> ">=0" (allow any number)
#   - "0" -> ">=1" (require at least 1)
#   - "1" -> ">=1" (allow 1 or more)
#
# This allows filling existing households beyond their original pattern
# while maintaining geographical constraints.

promotion:
  # Enable automatic promotion to accommodate leftover people
  enabled: true

  # Maximum number of promotion attempts per household
  max_attempts: 4

  # Priority order for promotion (which category to promote first)
  # LOWER NUMBER = PROMOTE FIRST (to accommodate leftover people)
  # Strategy: Promote flexible/scarce categories first
  priority:
    Young Adults: 1   # Promote young adults first (often leftover)
    Adults: 2         # Then adults
    Kids: 4           # Promote kids last (need supervision)

  # Validation rules for promoted patterns (same format as demotion)
  validation_rules:
    - name: "Kids require adult supervision"
      description: "If there are kids in the household, there must be at least one adult"
      condition:
        category: "Kids"
        operator: ">="
        value: 1
      requirement:
        category: "Adults"
        operator: ">="
        value: 1

# Allocation strategy
allocation:
  # Strategy for selecting people to assign to households
  # Options:
  #   - "random": Randomly select from available people
  #   - "age_sorted": Sort by age and allocate in order
  #   - "balanced": Try to balance age distributions
  strategy: "random"

  # Whether to allow partial household allocation
  # If false, households that can't be fully filled are skipped
  allow_partial: false

  # Random seed for reproducibility (null = use global seed)
  seed: null
