# ========================================
# RELATIONSHIP PIPELINE - Build agent networks
# ========================================
# Build relationship networks between agents for disease modeling.
# All relationship types are fully configurable via Yaml.

relationship_pipeline:
  enabled: true

  relationships:
    # Social contacts network (for disease transmission)
    - config: "world_specific_code/MedievalYaml/yaml/relationships/social_contacts.yaml"

  # Notes:
  # - Each relationship config defines a different type of network
  # - Relationships are built AFTER venue assignments (so activity_map is populated)
  # - Connections are stored in person.properties (key defined in Yaml config)
  # - Add property names to serialization_config.yaml to include in HDF5 export

# ========================================
# POST-RELATIONSHIP PIPELINE
# ========================================
# Distributors that run AFTER relationship building.
# These can use relationship data (social_contacts, friendships, etc.)
# to derive new activities.

post_relationship_pipeline:
  enabled: false

  steps:
    # Assign visit_social_contact activity based on social contacts' residences
    - type: distributor
      config: "world_specific_code/MedievalYaml/yaml/distributors/social_contact_visit_distributor.yaml"

# ========================================
# EXAMPLES
# ========================================

# Example 1: Load only London LGU and all its children
# filter:
#   level: LGU
#   codes: [London]
#   file: null

# Example 2: Load specific MGUs from a file (for large lists)
# filter:
#   level: MGU
#   codes: []
#   file: filters/my_mgus.txt

# Example 3: Load specific MGUs inline (for small lists)
# filter:
#   level: MGU
#   codes: [E02000173, E02000187, E02000414]
#   file: null

# Example 4: Load specific SGUs and their parent hierarchy
# filter:
#   level: SGU
#   codes: [E00004320, E00004321, E00004326]
#   file: null

# Example 5: Load all units (set load_all to true OR set level to null)
# load_all: true
# OR
# filter:
#   level: null
#   codes: []
#   file: null