# Single Residence World - Household Configuration
# One category covering all ages, single giant household

categories:
  - name: "People"
    symbol: "P"
    attribute: "age"
    type: "numerical"
    numerical:
      min: 0
      max: null

demotion:
  enabled: false
  max_attempts: 1
  min_household_size: 1
  priority:
    People: 1
  validation_rules: []

promotion:
  enabled: false

allocation:
  strategy: "random"
  allow_partial: false
  seed: null
