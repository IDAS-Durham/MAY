# Single Residence World Configuration
# 1M people, 1 SGU, 1 household containing everyone

geography:
  data_dir: "world_specific_code/Single_Residence_World/data/geography"
  levels: ["SGU", "MGU", "LGU"]
  load_all: true
  filter:
    level: null
    codes: []

population:
  data_dir: "world_specific_code/Single_Residence_World/data/population"
  demographics_male_file: "demographics_male.csv"
  demographics_female_file: "demographics_female.csv"

venues:
  data_dir: "world_specific_code/Single_Residence_World/data/venues"
  config_file: "world_specific_code/Single_Residence_World/yaml/venues/venues_config.yaml"
  export_file: "venue_allocations.csv"

households:
  data_dir: "world_specific_code/Single_Residence_World/data/households"
  data_file: "households.csv"
  config_file: "world_specific_code/Single_Residence_World/yaml/households/households_config.yaml"
  strategy_file: "world_specific_code/Single_Residence_World/yaml/households/allocation_strategy.yaml"
  export_file: "household_allocations.csv"

attributes:
  enabled: false
  configs: []

venue_pipeline:
  enabled: false
  steps: []

relationship_pipeline:
  enabled: false
  relationships: []

romantic_relationships:
  enabled: false
