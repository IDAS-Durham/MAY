# Simple Test World - Company Distributor
# Assigns working-age people (18-64) to one of 10 companies in their region

distributor_name: "simple_company_distributor"
venue_type: "company"
description: "Distribute working-age people to companies"

activity_map_key: "primary_activity"

eligibility:
  require_unassigned: false

  global_filters:
    - attribute: "age"
      type: "numerical"
      description: "Only working-age people"
      min: 18
      max: 64

venue_selection:
  consider_by: "geo_unit"
  venue_geo_level: "SGU"
  batch_geo_level: "SGU"
  filter_by_geography: true
  respect_capacity: true

allocation:
  strategy: "random"
  capacity_column: "employee_count"
  capacity_handling:
    if_missing: "skip"
    if_zero: "skip"
  track_capacity: true
  when_full: "exclude"
  batch_by: "geo_unit"

settings:
  priority: 5
  max_allocations: null
  verbose: true
  log_summary: true

fallback:
  strategy: "skip"
