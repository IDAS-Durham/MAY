# Simple Test World - Household Configuration
# Single category: everyone is a "Person", households of 5

categories:
  - name: "People"
    symbol: "P"
    attribute: "age"
    type: "numerical"
    numerical:
      min: 0
      max: null

demotion:
  enabled: true
  max_attempts: 5
  min_household_size: 1
  priority:
    People: 1
  validation_rules: []

promotion:
  enabled: false

allocation:
  strategy: "random"
  allow_partial: false
  seed: null
