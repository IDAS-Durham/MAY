geography:
  data_dir: data/NZ1918_data/geography
  levels:
    - SGU
    - MGU
  load_all: true
  filter:
    codes: []
population:
  data_dir: data/NZ1918_data/population
  demographics_male_file: demography_male.csv
  demographics_female_file: demography_female.csv
venues:
  data_dir: data/NZ1918_data/venues
  config_file: configs/NewZealand1918/venues/venues_config.yaml
  export_file: venue_allocations.csv
households:
  data_dir: data/NZ1918_data/households
  data_file: synthetic_households.csv
  config_file: configs/NewZealand1918/households/households_config.yaml
  rules_file: configs/NewZealand1918/households/relationship_rules.yaml
  strategy_file: configs/NewZealand1918/households/allocation_strategy.yaml
  rounds_file:
  export_file: household_allocations.csv

timeline:
  enabled: true
  steps:
    # Households + residence venues. This scenario has no attribute/distributor
    # steps, so the timeline is just this explicit allocation step.
    - type: residence_allocation
