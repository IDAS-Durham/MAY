# MAY Configuration File — New Zealand 1918
#
# Geography model: Provinces (MGU) contain Boroughs and Counties (both SGU).
# Borough SGU IDs are prefixed BR#####, county IDs CT#####.
#
# Current scope: geography + demographics only. Households, venues, and
# downstream pipelines are intentionally disabled — they will be added as
# the NZ 1918 data matures (no venue data exists yet; household composition
# data is size-only and not yet wired to a compatible allocator).

geography:
  data_dir: "data/NZ1918_data/geography"
  levels: [SGU, MGU]
  load_all: false

  # Example filter (uncomment to load a single province):
  filter:
    level: MGU
    codes: [Marlborough]

population:
  data_dir: "data/NZ1918_data/population"
  demographics_male_file: "demographics_male.csv"
  demographics_female_file: "demographics_female.csv"

venues:
  data_dir: "data/NZ1918_data"
  config_file: "configs/1918/venues_config.yaml"

households:
  enabled: true
  data_dir: "data/NZ1918_data/households"
  data_file: "household_compositions.csv"
  # Uses 2021's K/YA/A/OA schema — our sampler emits patterns in that format.
  config_file: "configs/1918/households/households_config.yaml"
  rules_file: "configs/1918/households/relationship_rules.yaml"
  # The allocation strategy lives on the timeline's residence_allocation step.
  export_file: "household_allocations.csv"

timeline:
  enabled: true
  steps:
    # This scenario only builds households + residence venues; no attribute
    # or distributor steps. Households are allocated by this explicit step.
    - type: residence_allocation
      config: "configs/1918/households/allocation_strategy.yaml"

relationship_pipeline:
  enabled: false

romantic_relationships:
  enabled: false

debug_outputs:
  enabled: false

serialization:
  enabled: true
  config_file: "configs/1918/serialization_config.yaml"
  output_dir: "output/1918"
  filename: "nz_1918_world_small.h5"
  compression: "gzip"
