# Relationship Rules Configuration — NZ 1918
#
# Adapted from configs/2021/households/relationship_rules.yaml. Same schema and
# rule list; the differences vs. 2021 are:
#
#   1. `same_category_sources` is intentionally empty. There is no per-area
#      sexual-orientation data for NZ 1918, so we have no source to override
#      the scalar fallback.
#
#   2. `same_category_probability_fallback` is set to 0.0 on all pair_matching
#      rules — same-sex couples are not modeled for 1918. (Set to a small
#      positive number if you want to allow them.)
#
#   3. Preferred age-difference distributions are shifted to reflect 1918 NZ:
#        - parent-child mean lowered from 32 -> 28 (women had children earlier;
#          mean maternal age in NZ around 1918 sat near 28).
#        - grandparent-parent mean lowered from 30 -> 28.
#        - spousal mean_difference raised from 3.0 -> 4.0 (husbands typically
#          a few years older than wives in early-20th-century NZ).
#      Tune these freely; they are modeling choices, not hard data.

enabled: true

# ============================================================================
# PER-AREA "SAME-CATEGORY" PROBABILITY SOURCES (optional)
# ============================================================================
# No 1918 source data available. Left empty so the scalar
# `same_category_probability_fallback` on each rule is authoritative.
# ============================================================================
same_category_sources: []

# =============================================
# SELECTION STRATEGY
# =============================================
selection_strategy:
  max_attempts: 10
  use_best_candidate: true
  penalty_mode: "squared"
  log_violations: true

  backtracking:
    enabled: true
    max_backtracks: 3
    strategy: "first_role"
    log_backtracks: true
    avoid_duplicates: true

# =============================================
# STATISTICS
# =============================================
track_statistics: true

# =============================================
# PATTERN-BASED RELATIONSHIP RULES
# =============================================

rules:
  # Rule 1: Families with 2 adults and kids
  - name: "Two-adult family with kids"
    patterns:
      - ">=2 >=0 2 0"
      - "1 >=0 2 0"

    roles:
      role_A:
        categories: ["Kids"]
        count: "any"

      role_B:
        categories: ["Adults"]
        count: 2

    selection_order:
      - role_A
      - role_B

    constraints:
      - type: "numerical_attribute_difference"
        attribute: "age"
        role_1: "role_B"
        role_2: "role_A"
        min_difference: 16
        max_difference: 50
        max_difference_by_categorical_attribute:
          attribute: "sex"
          values:
            female: 50
            male: 55
        preferred_distribution:
          type: "normal"
          mean: 28          # 1918: women had children younger than today
          std: 6
          tolerance: 9

      - type: "pair_matching"
        role: "role_B"
        categorical_attribute:
          attribute: "sex"
          same_category_probability_fallback: 0.0  # 1918: no same-sex couples modeled
        numerical_attribute:
          attribute: "age"
          mean_difference: 4.0   # 1918: husbands typically slightly older
          std_difference: 5.0
          max_absolute_difference: 20
        creates_romantic_couple: true

  # Rule 2: Single-adult families with kids
  - name: "Single-adult family with kids"
    patterns:
      - ">=2 >=0 1 0"
      - "1 >=0 1 0"

    roles:
      role_A:
        categories: ["Kids"]
        count: "any"

      role_B:
        categories: ["Adults"]
        count: 1

    selection_order:
      - role_A
      - role_B

    constraints:
      - type: "numerical_attribute_difference"
        attribute: "age"
        role_1: "role_B"
        role_2: "role_A"
        min_difference: 16
        max_difference: 50
        max_difference_by_categorical_attribute:
          attribute: "sex"
          values:
            female: 50
            male: 55
        preferred_distribution:
          type: "normal"
          mean: 28
          std: 6
          tolerance: 9

  # Rule 3: Two-adult families with young adults
  - name: "Two-adult family with young adults"
    patterns:
      - "0 >=1 2 0"

    roles:
      role_A:
        categories: ["Young Adults"]
        count: "any"

      role_B:
        categories: ["Adults"]
        count: 2

    selection_order:
      - role_A
      - role_B

    constraints:
      - type: "numerical_attribute_difference"
        attribute: "age"
        role_1: "role_B"
        role_2: "role_A"
        min_difference: 16
        max_difference: 50
        max_difference_by_categorical_attribute:
          attribute: "sex"
          values:
            female: 50
            male: 55
        preferred_distribution:
          type: "normal"
          mean: 28
          std: 6
          tolerance: 9

      - type: "pair_matching"
        role: "role_B"
        categorical_attribute:
          attribute: "sex"
          same_category_probability_fallback: 0.0
        numerical_attribute:
          attribute: "age"
          mean_difference: 4.0
          std_difference: 5.0
          max_absolute_difference: 20
        creates_romantic_couple: true

  # Rule 4: Single-adult families with young adults
  - name: "Single-adult family with young adults"
    patterns:
      - "0 >=1 1 0"

    roles:
      role_A:
        categories: ["Young Adults"]
        count: "any"

      role_B:
        categories: ["Adults"]
        count: 1

    selection_order:
      - role_A
      - role_B

    constraints:
      - type: "numerical_attribute_difference"
        attribute: "age"
        role_1: "role_B"
        role_2: "role_A"
        min_difference: 16
        max_difference: 50
        max_difference_by_categorical_attribute:
          attribute: "sex"
          values:
            female: 50
            male: 55
        preferred_distribution:
          type: "normal"
          mean: 28
          std: 6
          tolerance: 9

  # Rule 5: Adult pairs (no kids)
  - name: "Adult pair"
    patterns:
      - "0 0 2 0"

    roles:
      role_A:
        categories: ["Adults"]
        count: 2

    selection_order:
      - role_A

    constraints:
      - type: "pair_matching"
        role: "role_A"
        categorical_attribute:
          attribute: "sex"
          same_category_probability_fallback: 0.0
        numerical_attribute:
          attribute: "age"
          mean_difference: 4.0
          std_difference: 5.0
          max_absolute_difference: 20
        creates_romantic_couple: true

  # Rule 6: Elderly pairs
  - name: "Elderly pair"
    patterns:
      - "0 0 0 2"

    roles:
      role_A:
        categories: ["Old Adults"]
        count: 2

    selection_order:
      - role_A

    constraints:
      - type: "pair_matching"
        role: "role_A"
        categorical_attribute:
          attribute: "sex"
          same_category_probability_fallback: 0.0
        numerical_attribute:
          attribute: "age"
          mean_difference: 4.0
          std_difference: 5.0
          max_absolute_difference: 20
        creates_romantic_couple: true

  # Rule 7: Adding young adults to existing families (for household_excess steps)
  - name: "Add young adults to existing family"
    patterns:
      - "0 >=1 2 0"
      - "0 >=1 1 0"
      - ">=2 >=0 2 0"
      - "1 >=0 2 0"

    roles:
      role_A:
        categories: ["Young Adults"]
        count: "any"

      role_B:
        categories: ["Adults"]
        count: "any"

    selection_order:
      - role_A

    constraints:
      - type: "numerical_attribute_difference"
        attribute: "age"
        role_1: "role_A"
        role_2: "role_B"
        min_difference: -50
        max_difference: -16
        max_difference_by_categorical_attribute:
          attribute: "sex"
          values:
            female: -16
            male: -16

  # Rule 8: Multi-generational families
  - name: "Multi-generational household"
    patterns:
      - ">=2 >=0 >=0 >=0"
      - "1 >=0 >=0 >=0"

    roles:
      role_A:
        categories: ["Kids"]
        count: "any"

      role_B:
        categories: ["Adults"]
        count: "any"

      role_C:
        categories: ["Old Adults"]
        count: "any"

    selection_order:
      - role_A
      - role_B
      - role_C

    constraints:
      - type: "numerical_attribute_difference"
        attribute: "age"
        role_1: "role_B"
        role_2: "role_A"
        min_difference: 16
        max_difference: 50
        max_difference_by_categorical_attribute:
          attribute: "sex"
          values:
            female: 50
            male: 55
        preferred_distribution:
          type: "normal"
          mean: 28
          std: 6
          tolerance: 9

      - type: "pair_matching"
        role: "role_B"
        require_exact_count: 2
        categorical_attribute:
          attribute: "sex"
          same_category_probability_fallback: 0.0
        numerical_attribute:
          attribute: "age"
          mean_difference: 4.0
          std_difference: 5.0
          max_absolute_difference: 20

      - type: "numerical_attribute_difference"
        attribute: "age"
        role_1: "role_C"
        role_2: "role_B"
        min_difference: 16
        max_difference: 50
        max_difference_by_categorical_attribute:
          attribute: "sex"
          values:
            female: 50
            male: 55
        preferred_distribution:
          type: "normal"
          mean: 28          # 1918: grandparent-parent gap slightly tighter than today
          std: 7
          tolerance: 10

# =============================================
# CONSTRAINT TYPES
# =============================================
#
# 1. numerical_attribute_difference
#    Validates: (role_1[attribute] - role_2[attribute]) is within [min_difference, max_difference]
#
#    When selecting a person for role_1 with existing people in role_2:
#      - Check against the MINIMUM value in role_2 for min_difference
#      - Check against the MAXIMUM value in role_2 for max_difference
#
#    Parameters:
#      - attribute: Name of the numerical attribute to compare (e.g., "age", "income")
#      - role_1: First role name
#      - role_2: Second role name
#      - min_difference: Minimum value for (attribute_1 - attribute_2)
#      - max_difference: Maximum value for (attribute_1 - attribute_2), default
#      - max_difference_by_categorical_attribute: (optional) Override max based on a categorical attribute
#          - attribute: Name of categorical attribute (e.g., "sex", "occupation")
#          - values: Dict mapping category values to max_difference overrides
#
# 2. pair_matching
#    Selects 2 people from a role to form a compatible pair based on attributes
#    Can be used for: romantic partners, roommates, business partners, siblings, etc.
#
#    Parameters:
#      - role: Role name
#      - require_exact_count: Only apply if role has exactly N people (optional)
#      - categorical_attribute: (optional) Constraints on a categorical attribute
#          - attribute: Name of categorical attribute (e.g., "sex", "religion", "occupation")
#          - same_category_probability_fallback: Probability of matching categories (0.0-1.0).
#              Used as the fallback when a top-level `same_category_source` is configured
#              but the candidate's geography is missing from it. When no source is
#              configured at all, this is the authoritative probability.
#      - numerical_attribute: (optional) Constraints on a numerical attribute
#          - attribute: Name of numerical attribute (e.g., "age", "income", "education_years")
#          - mean_difference: Target mean difference
#          - std_difference: Standard deviation of difference
#          - max_absolute_difference: Hard limit on |value_1 - value_2|
