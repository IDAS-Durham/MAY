# ============================================================================
# Romantic / Sexual Relationship Configuration
# ============================================================================
# Assigns a sexual orientation to every adult and stamps a relationship_status.
# It does not match partners — it recognises the couples household allocation
# already built (via the cohabiting_couple person property).
# ============================================================================

name: "romantic_relationships"

# Who gets an orientation assigned (global_filters, same shape as distributors;
# a person must pass ALL of them). Here: adults 16+.
eligibility:
  global_filters:
    - attribute: "age"
      type: "numerical"
      min: 16
      max: 120

# Orientation source. Declared explicitly: when `data_sources` is present the
# distributor rakes P(orientation | sex, age, geo_unit) from the two files by
# IPF, and both files MUST exist (fail-loud, adr/0010). Worlds without area
# orientation data (e.g. MedievalYaml) OMIT `data_sources` entirely and instead
# add a `probabilities` + `age_adjustments` block under `sexual_orientations`
# (the YAML path — see martha-docs/configs_explained/relationships.md).
data_sources:
  demographic_distribution:            # P(orientation | sex, age_group)
    path: "${data_root}/population/sexual_orientation/orientation_prevalence_extended.csv"
  geo_distribution:                    # P(orientation | geo_unit)
    path: "${data_root}/population/sexual_orientation/orientation_by_msoa_normalized.csv"
    geo_level: "MGU"                   # the geography level this distribution is keyed at

sexual_orientations:
  types:
    - heterosexual
    - homosexual
    - bisexual

  # orientation -> own_sex -> allowed partner sexes. Gates a coupled person's
  # orientation against their partner's sex (used on both the data and YAML paths).
  compatibility:
    heterosexual:
      male: [female]
      female: [male]
    homosexual:
      male: [male]
      female: [female]
    bisexual:
      male: [male, female]
      female: [male, female]

storage:
  orientation_key: "sexual_orientation"
  status_key: "relationship_status"
