# ============================================================================
# Romantic/Sexual Relationship Configuration (Simplified)
# ============================================================================
# This configuration only defines sexual orientations and storage keys.
# actual matching is handled by pre-existing cohabiting couple status.
# ============================================================================

name: "romantic_relationships"

# General Constraints
min_age: 16
max_age: 120

# Data sources (UK / ONS-driven). When present, the distributor uses raked
# probabilities P(o | sex, age, msoa) ∝ P_nat(o | sex, age) · P_msoa(o) / P_nat_marginal(o)
# instead of the YAML `probabilities` block below. Worlds that do not have
# UK MSOA codes (e.g. MedievalYaml) should override this YAML and omit
# `data_sources` to fall back to the YAML-only path.
data_sources:
  prevalence_path: "data/population/sexual_orientation/orientation_prevalence_extended.csv"
  msoa_marginal_path: "data/population/sexual_orientation/orientation_by_msoa_normalized.csv"
  geo_level: "MGU"

# Verification logging. OFF for production runs (the heavy diagnostics walk
# the entire population multiple times). Flip to true after a code change to
# verify behavior — outputs national-vs-empirical comparison, MSOA quintile
# sweep, etc. (see RomanticDistributor._log_verbose_diagnostics).
diagnostics:
  verbose: false

# Sexual Orientation Configuration
sexual_orientations:
  types:
    - heterosexual
    - homosexual
    - bisexual

  probabilities:
    male:
      heterosexual: 0.90
      homosexual: 0.05
      bisexual: 0.05
    female:
      heterosexual: 0.85
      homosexual: 0.05
      bisexual: 0.10

  age_adjustments:
    "16-25":
      bisexual: 1.3
    "65-74":
      homosexual: 0.7
      bisexual: 0.5
    "75+":
      homosexual: 0.7
      bisexual: 0.5

  compatibility:
    heterosexual:
      male: [female]
      female: [male]
    homosexual:
      male: [male]
      female: [female]
    bisexual:
      male: [male, female]
      female: [male, female]

# Storage Configuration
storage:
  orientation_key: "sexual_orientation"
  status_key: "relationship_status"