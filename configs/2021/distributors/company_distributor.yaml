distributor_name: "company_distributor"
venue_type: "company"
description: "Distribute people to companies"

activity_map_key: "primary_activity"

eligibility:

  require_unassigned: true

  global_filters:
    - attribute: "age"
      type: "numerical"
      description: "Only consider working-age people"
      min: 18
      max: 64

    - attribute: "properties.workplace_sgu"
      type: "categorical"
      description: "Geographical unit name for where they are supposed to work"

    - attribute: "properties.work_sector"
      type: "categorical"
      description: "what type of industry they work in"

    - attribute: "residence.type"
      type: "categorical"
      description: "Exclude people in care homes, prisons, and student dorms"
      values: ["household"]

  attributes:
    - name: "properties.work_sector"
      type: "categorical"
      description: "Person's work_sector (from properties) should match company industry sector"

      # Check against venue's CSV column
      venue_column: "industry_code"

      # Identity mapping: each industry code accepts only people with matching work_sector
      matching_rules:
        "A": ["A"]
        "B": ["B"]
        "C": ["C"]
        "D": ["D"]
        "E": ["E"]
        "F": ["F"]
        "G": ["G"]
        "H": ["H"]
        "I": ["I"]
        "J": ["J"]
        "K": ["K"]
        "L": ["L"]
        "M": ["M"]
        "N": ["N"]
        "O": ["O"]
        "Other": ["Other"]
        "P": ["P"]
        "Q": ["Q"]

      # Case sensitivity
      case_sensitive: false

venue_selection:
  # Use geographical hierarchy matching
  # Person's workplace_location (SGU) → Company's geo_unit (MGU)
  consider_by: "geo_unit"

  # Companies are at MGU level
  venue_geo_level: "MGU"

  # Use workplace_sgu instead of geographical_unit (residence)
  # This matches people to companies near their WORK location, not home
  # Note: workplace_sgu is the SGU code, stored in person.properties
  locate_person_by: "properties.workplace_sgu"

  # Batch at SGU level (workplace) for better performance
  # Even though companies are at MGU level, we batch people by their specific workplace SGU
  # The system will still find companies in the parent MGU
  batch_geo_level: "SGU"

  # Only consider companies in loaded geography with capacity
  filter_by_geography: true
  respect_capacity: true

allocation:
  # Allocation strategy
  strategy: "random"  # Randomly pick from eligible companies

  # Capacity management
  capacity_column: "employee_count"

  capacity_handling:
    if_missing: "skip"  # Skip companies without employee_count
    if_zero: "skip"     # Skip companies with 0 employees

  track_capacity: true
  when_full: "exclude"  # Remove full companies from options

  # Capacity priority (adr/0016): people carrying this property are allocated
  # AFTER everyone else, so native in-boundary workers claim real jobs first and
  # redistributed (bounced-back) workers take only the leftover slack. Those that
  # still don't fit are an explicit overflow-to-outside category (no venue, counted).
  # Must match `redistributed_flag` in workplace_assignment.yaml. Omit to disable.
  deprioritize_flag: "workplace_redistributed"

  # Batch processing for performance
  batch_by: "geo_unit"

settings:
  priority: 5  # Run after school (10) and university (1)
  max_allocations: null
  verbose: true
  log_summary: true

fallback:
  strategy: "skip"  # Skip if no matching companies found