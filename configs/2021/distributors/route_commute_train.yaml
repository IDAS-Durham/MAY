# Train commute legs
#
# Looks up data/activities/commute/route_legs.csv by (origin_mgu, dest_mgu, mode_class)
# for every person whose commute_mode == "train", and places them on each leg
# of their journey as a `train_line.rider`, attaching (t_board_min,
# t_alight_min) as per-membership metadata. Misses fall back to car_solo.
distributor_type: "route"
distributor_name: "route_commute_train"

activity_map_key: "commute"
leg_venue_type: "train_line"
leg_subset_key: "rider"

routes_table: "data/activities/commute/routes.csv"
legs_table:   "data/activities/commute/route_legs.csv"

# Person -> routing-table key. MGUs in the routing table are MSOA codes
# (E02XXXXXX) and match GeographicalUnit.name directly.
origin_source:
  type: "ancestor"
  from: "geographical_unit"      # rider's residence (SGU)
  level: "MGU"
destination_source:
  type: "ancestor"
  from: "properties.workplace_sgu"
  level: "MGU"

# Class selector: only act on train commuters.
class_source: "properties.commute_mode"
class_filter: "train"
class_map:
  train: "train"

# Eligibility: must have commute_mode set (i.e. passed the Step A gates).
require_properties:
  - "commute_mode"

# Per-leg numeric metadata to attach to Subset.member_metadata. Keys are the
# field names stored on the subset (and later in the HDF5 side-table); values
# are the columns to read from route_legs.csv.
leg_metadata:
  t_board_min:  "t_board_min"
  t_alight_min: "t_alight_min"

# route-miss fallback. Overwrite commute_mode to walk; no venue is
# assigned (so zero commute transmission).
on_miss:
  set:
    commute_mode: "car_solo"

settings:
  verbose: true
