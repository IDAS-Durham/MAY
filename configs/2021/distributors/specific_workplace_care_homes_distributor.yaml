# ============================================================================
# Specific Workplace Distributor - Care Homes (Q Sector)
# ============================================================================
# This distributor allocates health sector (Q) workers to care homes.
# Access via: person.activity_map['primary_activity'] -> care_home venue
#
# Principles:
# - Sector-specific allocation (only Q workers)
# - Location-based (uses workplace_sgu for geographical matching)
# - Runs AFTER hospitals distributor (catches Q workers not assigned to hospitals)
# - Runs BEFORE company_distributor to capture health sector workers
# ============================================================================

# ============================================================================
# BASIC INFO
# ============================================================================
distributor_name: "specific_workplace_care_homes_distributor"
venue_type: "care_home"
description: "Distribute health sector (Q) workers to care homes"

# Activity mapping: This allocation sets the person's activity_map
# Access: person.activity_map['primary_activity'] will return the care_home venue object
activity_map_key: "primary_activity"

# Subset to add workers to
subset_key: "worker"

# ============================================================================
# ELIGIBILITY: Who can be allocated?
# ============================================================================

eligibility:

  require_unassigned: true

  global_filters:
    - attribute: "age"
      type: "numerical"
      description: "Only consider working-age people"
      min: 18
      max: 64

    - attribute: "properties.workplace_sgu"
      type: "categorical"
      description: "Geographical unit name for where they are supposed to work"

    - attribute: "properties.work_sector"
      type: "categorical"
      description: "Only Q (Health) sector workers"
      values: ["Q"]

    - attribute: "residence.type"
      type: "categorical"
      description: "Exclude people in care homes, prisons, and student dorms"
      values: ["household"]

  attributes:
    - name: "properties.work_sector"
      type: "categorical"
      description: "Person's work_sector (from properties) should be Q (Health)"

      # Only Q sector workers
      matching_rules:
        "Q": ["Q"]

      # Case sensitivity
      case_sensitive: false

# ============================================================================
# VENUE SELECTION: How to pick eligible venues?
# ============================================================================

venue_selection:
  # Use geographical hierarchy matching
  # Person's workplace_location (SGU) → Care home's geo_unit (typically SGU or MGU)
  consider_by: "geo_unit"

  # Care homes are typically at SGU or MGU level
  venue_geo_level: "LGU"

  # Use workplace_sgu instead of geographical_unit (residence)
  # This matches people to care homes near their WORK location, not home
  locate_person_by: "properties.workplace_sgu"

  # Batch at SGU level (workplace) for better performance
  batch_geo_level: "SGU"

  # Only consider care homes in loaded geography with capacity
  filter_by_geography: true
  respect_capacity: true

# ============================================================================
# ALLOCATION STRATEGY: How to assign person to venue?
# ============================================================================

allocation:
  # Allocation strategy
  strategy: "random"  # Randomly pick from eligible care homes

  # Capacity management
  capacity_column: "number_staff"

  capacity_handling:
    if_missing: "skip"  # Skip care homes without staff count
    if_zero: "skip"     # Skip care homes with 0 staff

  track_capacity: true
  when_full: "exclude"  # Remove full care homes from options

  # Batch processing for performance
  batch_by: "geo_unit"

# ============================================================================
# EXECUTION SETTINGS
# ============================================================================

settings:
  # Execution order (higher = earlier)
  # Run after hospitals (4) but before company (5)
  priority: 3

  # Limit number of allocations (null = no limit)
  max_allocations: null

  # Logging
  verbose: true
  log_summary: true

# ============================================================================
# FALLBACK BEHAVIOR
# ============================================================================

fallback:
  strategy: "skip"  # Skip if no matching care homes found

# ============================================================================
# NOTES
# ============================================================================
#
# ALLOCATION LOGIC:
#
# 1. Filter people by:
#    - Working age (18-64)
#    - Has workplace_sgu assigned
#    - Work sector = Q (Health)
#    - Lives in household (not communal residence)
#    - NOT already assigned (catches Q workers who weren't assigned to hospitals)
#
# 2. For each Q worker:
#    - Find all care homes in their workplace area (workplace_sgu)
#    - Filter by capacity (number_staff)
#    - Randomly select one care home from eligible options
#
# 3. Track capacity:
#    - Use number_staff as capacity measure
#    - Exclude care homes when full
#    - Skip care homes with missing or zero capacity
#
# 4. Fallback:
#    - If no suitable care homes found, skip (person remains unassigned)
#    - They will go to company_distributor as fallback
#
# ALLOCATION ORDER:
# - This runs AFTER specific_workplace_hospitals_distributor
# - This ensures Q workers are allocated to hospitals first
# - Any remaining Q workers (not assigned to hospitals) get allocated to care homes
# - Any still remaining go to company_distributor
#
# ============================================================================
