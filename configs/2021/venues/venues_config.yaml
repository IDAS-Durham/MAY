# Venue Configuration for MAY
#
# This file defines what venue types to load and how to load them.
# Users can easily add, remove, or configure venue types by editing this file.

# Venue types to load
# Each venue type can specify:
#   - enabled: Whether to load this venue type (default: true)
#   - filename: CSV file to load from, relative to venues data_dir (required
#               for enabled types; for batch_mode use a "{unit}" placeholder)
#   - is_residence: Whether people live at this venue type (default: false)
#   - description: Free-text note (not consumed by the engine)

venue_types:
  # =============================================
  # SPECIAL: Household (created dynamically)
  # =============================================
  # This venue type is NOT loaded from CSV - it's created by the household
  # distributor during world creation. We list it here only to mark it as
  # a residence type.
  household:
    enabled: false  # Not loaded from CSV (created dynamically)
    is_residence: true  # People live here
    description: "Residential households (created by household distributor)"
    
  hospital:
    enabled: true
    filename: medical/hospitals.csv
    description: "Healthcare facilities providing medical treatment"
    is_residence: false  # Not a place where people live

  school:
    enabled: true
    filename: primary_activities/Schools_EW.csv
    description: "Educational institutions for primary and secondary education"
    is_residence: false  # Not a place where people live

  university:
    enabled: true
    filename: primary_activities/uk_universities.csv
    description: "Higher education institutions"
    is_residence: false  # Not a place where people live

  care_home:
    enabled: true
    filename: residences/care_homes.csv
    description: "Residential care facilities for elderly or disabled persons"
    is_residence: true  # People live here

  prison:
    enabled: false
    filename: prisons.csv
    description: "Correctional institutions"
    is_residence: true  # People live here

  company:
    enabled: true
    filename: primary_activities/companies.csv
    description: "Commercial workplaces and businesses"
    is_residence: false  # Not a place where people live

  boarding_school:
    enabled: true
    filename: residences/boarding_schools.csv
    description: "Communal residence for school kids"
    is_residence: true  # People live here

  student_dorms:
    enabled: true
    filename: residences/student_dorms.csv
    description: "Communal residence for university students"
    is_residence: true  # People live here
  
  cinema:
    enabled: true
    filename: leisure/cinemas.csv
    description: "Leisure location"
    is_residence: false

  grocery:
    enabled: true
    filename: leisure/groceries.csv
    description: "Leisure location"
    is_residence: false
  
  gym:
    enabled: true
    filename: leisure/gyms.csv
    description: "Leisure location"
    is_residence: false
  
  pub:
    enabled: true
    filename: leisure/pubs.csv
    description: "Leisure location"
    is_residence: false

  # =============================================
  # SPECIAL: Transport-line venues (created dynamically by RouteDistributor)
  # =============================================
  # Materialised lazily by RouteDistributor — one venue per train/tube/bus
  # line_id, populated with `rider` subsets that carry per-membership
  # (t_board_min, t_alight_min) metadata (see Subset.member_metadata, and the
  # /activity_mappings/membership_metadata HDF5 side-table from Design B).
  #
  # Split per-mode (train/tube/bus) so JUNE's per-mode contact matrices in
  # contact_matrices.yaml (train_line / tube_line / bus_line) match. Each
  # RouteDistributor instance writes legs into its mode-specific type.
  #
  # supports_partial_presence is consumed JUNE-side via JUNE's own config
  # (contact_matrices.yaml-style declaration keyed by venue type name);
  # it is not serialised from here.
  train_line:
    enabled: false  # Not loaded from CSV (created dynamically by RouteDistributor)
    is_residence: false
    description: "Per-line commute venue (train / rail)"
  tube_line:
    enabled: false
    is_residence: false
    description: "Per-line commute venue (tube / metro / light rail)"
  bus_line:
    enabled: false
    is_residence: false
    description: "Per-line commute venue (bus pseudo-route)"

# Global venue settings
settings:
  # Filter venues to only include those in loaded geographical units
  filter_by_geography: true