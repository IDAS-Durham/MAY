# MAY Configuration File

geography:
  # Path to geography data files
  data_dir: "data/geography"

  # Define hierarchy levels (smallest to largest)
  # If not specified, defaults to ["SGU", "MGU", "LGU"]
  # Examples:
  #   - ["SGU", "MGU", "LGU"]           # 3 levels (default)
  #   - ["SGU", "MGU", "LGU", "XLGU"]   # 4 levels
  #   - ["Block", "Tract", "County"]    # Custom names
  # Current: Output Areas -> MSOAs -> Local Authorities -> Regions
  levels: ["SGU", "MGU", "LGU", "XLGU"]

  # Load all geographical units (ignores all filters below if true)
  load_all: false

  # ========================================
  # FILTER - Specify which geographical units to load
  # ========================================

  filter:
    # Level to filter on: LGU, MGU, or SGU
    # Leave as null to load all units
    level: LGU

    # Codes to filter (for small lists, comma-separated)
    codes: ["County Durham", "Darlington"]

    # Or specify a file path with codes (for large lists)
    # File should have one code per line
    #file: may/filters/example_mgu.txt

# ========================================
# POPULATION
# ========================================

population:
  # Path to population data files
  data_dir: "data/population"

  # Demographics files (matrix format: rows=geo_units, columns=ages)
  demographics_male_file: "demographics_male.csv"
  demographics_female_file: "demographics_female.csv"


# ========================================
# VENUES
# ========================================

venues:
  # Path to venue files
  data_dir: "data/venues"

  # Path to YAML configuration file (relative to project root or absolute path)
  config_file: "configs/2021/venues/venues_config.yaml"

  # Export file for venue allocations (automatically created after allocation)
  export_file: "venue_allocations.csv"

# ========================================
# HOUSEHOLDS
# ========================================

households:
  # Path to household data files
  data_dir: "data/households"

  # Household composition data file (CSV with patterns like ">=2 >=0 2 0")
  data_file: "households.csv"

  # Configuration file for age categories and demotion rules
  config_file: "configs/2021/households/households_config.yaml"

  # Relationship rules (couple/family pair matching, age constraints).
  # Required for rules to apply. If this key is omitted, relationship rules
  # are disabled — there is no implicit lookup.
  rules_file: "configs/2021/households/relationship_rules.yaml"

  # =============================================
  # ALLOCATION MODE (choose one)
  # =============================================

  # Option 1: Unified strategy (RECOMMENDED - controls everything in one place)
  #   - Defines both household AND venue allocations in order
  #   - File: data/households/allocation_strategy.yaml
  strategy_file: "configs/2021/households/allocation_strategy.yaml"

  # Option 2: Multi-round households only (household rounds, no venue integration)
  #   - Only household allocation rounds
  #   - File: data/households/allocation_rounds.yaml
  #   - Set strategy_file to null to use this
  # rounds_file: "allocation_rounds.yaml"

  # Option 3: Single-pass allocation (original simple mode)
  #   - Set both strategy_file and rounds_file to null

  # Export file for household allocations (automatically created after distribution)
  export_file: "household_allocations.csv"

# ========================================
# DEBUG OUTPUTS
# ========================================
# Auxiliary CSV files written during world creation. They are useful for
# inspecting small worlds but build large in-memory DataFrames, so for
# country-scale runs (e.g. England 2021) leave this disabled.
# The canonical output is always `world_state.h5`; these CSVs are extras.
#
# Files controlled by this flag:
#   - household_allocations.csv   (one row per household member)
#   - venue_allocations.csv       (one row per venue)
#   - residence_venues.csv        (one row per residence assignment)
#   - unallocated_people.csv      (one row per person not placed in a household)

debug_outputs:
  enabled: true

# ========================================
# ATTRIBUTES
# ========================================

# ========================================
# TIMELINE - Unified Simulation Events
# ========================================
# Defines the exact sequence of simulation events (attribute assignment, venue distribution, etc.)
# This allows critical ordering, such as assigning schools/universities before workplaces.

timeline:
  enabled: true
  
  steps:
    # ----------------------------------------
    # 1. Initial Attributes (Ethnicity, Comorbidities)
    # ----------------------------------------
    - type: attribute
      config: "configs/2021/attributes/attribute_assignment.yaml"
      
    - type: attribute
      config: "configs/2021/attributes/comorbidity_assignment.yaml"

    # ----------------------------------------
    # 2. Education (Assigns primary_activity = school/university)
    # ----------------------------------------
    # School distribution
    - type: distributor
      config: "configs/2021/distributors/school_distributor.yaml"
      
    - type: child_creator
      config: "configs/2021/venue_child_creators/school_classrooms.yaml"

    # University distribution
    - type: distributor
      config: "configs/2021/distributors/university_distributor.yaml"
      
    - type: child_creator
      config: "configs/2021/venue_child_creators/university_uni_years.yaml"

    # ----------------------------------------
    # 3. Employment (Filters out people with primary_activity)
    # ----------------------------------------
    # Workplace location assignment (LGU + Work Mode)
    - type: attribute
      config: "configs/2021/attributes/workplace_assignment.yaml"
      
    # Workplace SGU assignment (within LGU)
    - type: attribute
      config: "configs/2021/attributes/workplace_sgu_assignment.yaml"
      
    # Work sector assignment
    - type: attribute
      config: "configs/2021/attributes/work_sector_assignment.yaml"

    # ----------------------------------------
    # 4. Specific Workplaces (Hospitals, Care Homes, Schools, etc.)
    # ----------------------------------------
    # Q sector -> Hospitals
    - type: distributor
      config: "configs/2021/distributors/specific_workplace_hospitals_distributor.yaml"
      
    # Q sector -> Care Homes
    - type: distributor
      config: "configs/2021/distributors/specific_workplace_care_homes_distributor.yaml"
      
    # P sector -> Schools
    - type: distributor
      config: "configs/2021/distributors/specific_workplace_classrooms_distributor.yaml"
      
    # ----------------------------------------
    # 5. General Employment (Companies)
    # ----------------------------------------
    - type: distributor
      config: "configs/2021/distributors/company_distributor.yaml"

    - type: child_creator
      config: "configs/2021/venue_child_creators/company_offices.yaml"

    #-----------------------------------------
    # 6. Work mode correction
    #-----------------------------------------
    # Overrides `work_mode` for workers placed in on-site venues
    # (hospital/care_home/classroom) — forces them to Normal regardless of
    # what the area-level O-D matrix in workplace_assignment sampled.
    # Office workers are left untouched.
    - type: attribute
      config: "configs/2021/attributes/work_mode_correction.yaml"

    #-----------------------------------------
    # 7. Commute assignment
    #-----------------------------------------
    # Runs AFTER all workplace distributors so it can gate on the actually-assigned
    # workplace venue (office/classroom/hospital/care_home, worker subset).
    - type: attribute
      config: "configs/2021/attributes/commute_mode_assignment.yaml"

    # Route legs for shared-transport modes. Each instance is a generic
    # RouteDistributor (D10) filtered to one mode_class — places riders on the
    # transport_line venues their journey traverses and records per-leg
    # (t_board_min, t_alight_min) on Subset.member_metadata (D11 / Design B).
    # Route misses fall back to commute_mode=walk (D12).
    - type: distributor
      config: "configs/2021/distributors/route_commute_train.yaml"

    - type: distributor
      config: "configs/2021/distributors/route_commute_tube.yaml"

    - type: distributor
      config: "configs/2021/distributors/route_commute_bus.yaml"

    # ----------------------------------------
    # 8. Other Services
    # ----------------------------------------
    - type: distributor
      config: "configs/2021/distributors/hospital_distributor.yaml"

    # Leisure (multi-venue)
    - type: distributor
      config: "configs/2021/distributors/multi_venue_distributor.yaml"

    # Care Home Visits (linked to residents)
    - type: distributor
      config: "configs/2021/distributors/care_home_visits_distributor.yaml"

# ========================================
# RELATIONSHIP PIPELINE - Build agent networks
# ========================================
# Build relationship networks between agents for disease modeling.
# All relationship types are fully configurable via YAML.

relationship_pipeline:
  enabled: true

  relationships:
    # Friendships network (for disease transmission)
    - config: "configs/2021/relationships/social_networks.yaml"

  # Notes:
  # - Each relationship config defines a different type of network
  # - Relationships are built AFTER venue assignments (so activity_map is populated)
  # - Connections are stored in person.properties (key defined in YAML config)
  # - Add property names to serialization_config.yaml to include in HDF5 export

# ========================================
# ROMANTIC RELATIONSHIPS - Sexual orientation and partnerships
# ========================================
# Build romantic/sexual relationship networks including:
# - Sexual orientation assignment
# - Exclusive relationships (monogamous couples)
# - Non-exclusive relationships (polyamorous/consensual non-monogamy)
# - Cheating/infidelity
# All parameters are configurable via YAML (probabilities, age differences, partner limits, etc.)

romantic_relationships:
  enabled: true  # Set to false to skip romantic relationship distribution
  config: "configs/2021/relationships/romantic_relationships.yaml"

  # Notes:
  # - Runs AFTER household distribution and social relationships
  # - Recognizes household couples (flagged with creates_romantic_couple in relationship_rules.yaml)
  # - Uses ethnicity partnership probabilities from data/population/ethnicity/
  # - Exports detailed CSVs: romantic_relationships_detailed.csv and cheating_network_detailed.csv

serialization:
  enabled: true
  config_file: "configs/2021/serialization_config.yaml"
  output_dir: "output/2021"
  filename: "world_state.h5"

# ========================================
# EXAMPLES
# ========================================

# Example 1: Load only London LGU and all its children
# filter:
#   level: LGU
#   codes: [London]
#   file: null

# Example 2: Load specific MGUs from a file (for large lists)
# filter:
#   level: MGU
#   codes: []
#   file: filters/my_mgus.txt

# Example 3: Load specific MGUs inline (for small lists)
# filter:
#   level: MGU
#   codes: [E02000173, E02000187, E02000414]
#   file: null

# Example 4: Load specific SGUs and their parent hierarchy
# filter:
#   level: SGU
#   codes: [E00004320, E00004321, E00004326]
#   file: null

# Example 5: Load all units (set load_all to true OR set level to null)
# load_all: true
# OR
# filter:
#   level: null
#   codes: []
#   file: null