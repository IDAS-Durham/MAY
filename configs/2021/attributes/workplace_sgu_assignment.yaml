# ============================================================================
# Workplace SGU Assignment Configuration
# ============================================================================
# Assigns specific SGU within the workplace LGU based on employment distribution.
# This provides fine-grained spatial workplace location.
#
# Assignment Level: person
# - Samples SGU within the workplace LGU weighted by total employment
# - More workers → higher probability of working in that SGU
#
# Dependencies: workplace_location (LGU name must be assigned first)
# ============================================================================

attribute:
  name: "workplace_sgu"
  description: "Assigns specific SGU within workplace LGU"
  data_type: "categorical"
  assignment_level: "person"

# ============================================================================
# Filters - Only assign to working-age people (18-65)
# ============================================================================
filters:
  age:
    attribute: "age"
    type: "numerical"
    description: "Working age population"
    numerical:
      min: 18
      max: 64

# ============================================================================
# Required Attributes (Dependencies)
# ============================================================================
required_attributes:
  workplace_location:
    description: "Workplace LGU must be assigned first"
    required: true
    error_if_missing: true

# ============================================================================
# Data Sources
# ============================================================================
data_sources:
  sgu_employment_distribution:
    type: "csv_lookup"
    format: "gu_sampler"
    description: "SGU employment totals within each LGU for spatial distribution"

    files:
      - path: "${data_root}/activities/work/EW_workers_by_industry_by_OA.csv"

        # Key column: Match person's workplace LGU (from properties)
        key_column: "LGU"

        # Geographical unit column: specifies which GU level to sample
        # The loader will aggregate all GUs at this level for each parent
        # and create a probability distribution
        geographical_unit_column:
          name: "SGU"  # CSV column name
          level: "SGU"  # Geographical level (SGU, MGU, LGU, etc.)

        weight_column: "Total"

        exclude_rows:
          - column: "SGU"
            values: ["ALL"]  # Exclude aggregate rows

# ============================================================================
# Assignment Rules (Person-Level)
# ============================================================================
assignment_rules:
  person:
    description: "Sample SGU within workplace LGU weighted by employment"

    rules:
      - description: "Probabilistic geographical unit selection weighted by total employment"
        priority: 1

        assignment:
          strategy: "geographical_unit_sampler"  # Generic strategy for sampling any GU level
          data_source: "sgu_employment_distribution"

# ============================================================================
# Settings
# ============================================================================
settings:
  logging:
    show_attribute_distribution: false  # Disable detailed distribution (too many SGUs)

# ============================================================================
# Notes
# ============================================================================
# This assignment distributes workers within a workplace LGU to specific SGUs
# based on employment density. SGUs with more jobs have higher probability.
#
# Example:
# - Person assigned to workplace_location = "Nuneaton and Bedworth" (LGU)
# - This config samples a specific SGU like "E00186958" within that LGU
# - Probability proportional to Total workers in each SGU
#
# Statistics:
# - show_attribute_distribution is set to false to avoid printing hundreds of
#   thousands of SGU codes in the logs. You'll still see the total count of
#   unique values and assignments
