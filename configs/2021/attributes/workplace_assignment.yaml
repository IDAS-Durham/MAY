# ============================================================================
# Workplace Location Assignment Configuration
# ============================================================================
# Assigns geographical workplace location and work mode to workers based on
# commuting flow patterns.
#
# Assignment Level: person
# - Assigns both workplace_location (LGU code) and work_mode (From_Home/Hybrid/Normal)
# - Based on origin-destination commuting likelihood matrices (LGU to LGU)
#
# Dependencies: None (this runs FIRST for workers, before sector assignment)
# ============================================================================

step:
  assignment_level: "person"

# This step produces TWO attributes from one joint (origin-destination) draw;
# the rule's `outputs:` map wires the strategy's fields to these names.
attributes:
  - name: "workplace_location"
    description: "Geographical location (LGU) where the person works"
    data_type: "categorical"
  - name: "work_mode"
    description: "Work mode: From_Home, Hybrid, or Normal commute"
    data_type: "categorical"

# ============================================================================
# Filters - Only assign to working-age people (18-65)
# NOTE: We assign workplace to all working-age adults (potential workforce)
#       The actual 'work' activity should be assigned separately based on employment rates
# ============================================================================
filters:
  age:
    attribute: "age"
    type: "numerical"
    description: "Working age population"
    numerical:
      min: 18
      max: 64

  # Exclude people who already have a primary activity (e.g. students)
  activities:
    exclude: ["primary_activity"]

# ============================================================================
# Data Sources
# ============================================================================
data_sources:
  commuting_flows:
    type: "csv_lookup"
    format: "origin_destination_matrix"
    description: "Commuting likelihood from residence to workplace (LGU to LGU)"

    # Out-of-boundary destination policy (adr/0015). REQUIRED — no default.
    # A region run (e.g. Manchester-only) draws workplace LGUs outside the loaded
    # world; this says what to do with them. Whole-country runs never trigger it.
    #   error        -> fail loud if any drawn destination is out of boundary
    #   redistribute -> keep workers in-boundary: drop out-of-boundary destinations
    #                   and renormalise each origin onto its in-boundary ones
    #   outside      -> model them as working outside the area (outside_value sentinel)
    out_of_boundary: "redistribute"
    # Required under redistribute: what to do for an origin whose ENTIRE
    # distribution is out of boundary (nothing to redistribute onto).
    on_empty: "outside"
    # Required whenever the 'outside' outcome can occur. The explicit sentinel
    # value written to workplace_location for out-of-area workers.
    outside_value: "OUTSIDE"
    # Optional (redistribute only): person property flagging a worker who was
    # bounced back in-boundary, so the venue layer can deprioritise them when
    # workplace capacity is scarce (adr/0016). Scenario-named, not hardcoded.
    redistributed_flag: "workplace_redistributed"

    files:
      - path: "${data_root}/activities/work/EW-work-destination-likelihood.csv"

        # Geographic unit levels for matching (configurable!)
        origin_level: "LGU"       # Match person's residence at LGU level
        destination_level: "LGU"  # Destination codes are LGU codes

        # Key column: origin LGU (person's residence LGU NAME)
        key_columns:
          LGU_origin_name:
            attribute: "geographical_unit"
            type: "ancestor_lookup"  # Traverse hierarchy to get LGU
            level: "LGU"
            property: "name"  # Use LGU name for matching

        # Column definitions for O-D matrix
        destination_column: "LGU_destination_name"  # Use NAME for easy matching with work data
        likelihood_column: "Likelihood"
        metadata_columns:
          work_mode: "Place of work indicator"
          destination_code: "LGU_destination_code"  # Keep code as metadata if needed
          count: "Count"

        # Filter out special destination codes
        exclude_destinations:
          - "888888888"  # Offshore Installation
          - "999999999"  # Outside UK

# NOTE: there is deliberately NO fallback here. The old config declared a
# "local_work" fallback chain (a constant-type data source with expression
# values, plus `fallback: "local_work"` on the source and a rule-level
# constant fallback pointing at it) — none of which the engine ever
# implemented: constant sources are skipped at load, and the rule fallback
# silently assigned None. A person whose origin LGU is missing from the
# matrix now fails the build loudly instead.

# ============================================================================
# Assignment Rules (Person-Level)
# ============================================================================
assignment_rules:
  person:
    description: "Assign workplace location and work mode based on commuting flows"

    rules:
      - description: "Sample destination from commuting flow matrix"
        priority: 1

        assignment:
          # New strategy: samples from O-D matrix with work mode
          strategy: "commuting_likelihood"
          data_source: "commuting_flows"

          # Assigns both workplace_location and work_mode
          outputs:
            workplace_location: "destination"
            work_mode: "work_mode"

# ============================================================================
# Settings
# ============================================================================
settings:
  logging:
    show_attribute_distribution: false  # Disable detailed distribution (too many SGUs)



# ============================================================================
# Notes
# ============================================================================
# The commuting flow data includes:
# - Origin SGU (person's residence)
# - Destination SGU (workplace location)
# - Work mode (From_Home, Hybrid, Normal)
# - Likelihood (probability of this origin-destination-mode combination)
#
# The assignment process:
# 1. Look up all destination options for person's origin SGU
# 2. Sample a (destination, work_mode) pair weighted by likelihood
# 3. Assign workplace_location = destination SGU
# 4. Assign work_mode = sampled work mode
#
# Special cases:
# - From_Home: workplace_location will be set to destination SGU from data
#              (which should be same as origin, but we use the data value)
# - Hybrid: workplace_location is physical workplace (commute some days)
# - Normal: workplace_location is daily workplace
