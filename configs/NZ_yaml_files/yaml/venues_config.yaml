venue_types:
  # =============================================
  # HOUSEHOLD (created dynamically)
  # =============================================
  household:
    enabled: false
    is_residence: true
    description: "Residential households (created by household distributor)"

  # =============================================
  # WORKPLACES (7 sectors)
  # Each uses sex-stratified capacity from n_male / n_female columns
  # =============================================
  workplace_agricultural:
    enabled: true
    filename: "workplaces_Agricultural.csv"
    is_residence: false
    subset_categories:
      - name: "Male"
        attribute: "sex"
        type: "categorical"
        categorical:
          allowed_values: ["male"]
      - name: "Female"
        attribute: "sex"
        type: "categorical"
        categorical:
          allowed_values: ["female"]
    capacity_config:
      attribute_capacities:
        filter_attributes:
          - name: "sex"
            type: "categorical"
        column_mappings:
          n_male:
            sex: "male"
          n_female:
            sex: "female"
      fallback_strategy: "strict"

  workplace_commercial:
