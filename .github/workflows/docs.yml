name: Deploy docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "may/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          # Match the project's runtime: the codebase uses 3.12+ syntax
          # (PEP 701 nested f-strings), so griffe must parse on >=3.12.
          python-version: "3.13"

      # Install the project's runtime deps so mkdocstrings/griffe can import
      # may.* modules during collection (allow_inspection is on).
      - run: pip install -r requirements.txt
      - run: pip install -r docs/requirements.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build and deploy
        working-directory: docs
        run: mkdocs gh-deploy --force --remote-branch gavin_docs --config-file mkdocs.yml
