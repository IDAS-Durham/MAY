# Multi-Round Household Allocation Configuration
#
# This file defines how households should be allocated across multiple rounds.
# Each round can target specific household patterns and set limits.

# Enable multi-round allocation (if false, uses single-pass allocation)
enabled: true

# Rounds are executed in order
rounds:
  # =============================================
  # Round 1: Elderly Couples
  # =============================================
  - name: "Elderly Couples"
    description: "Allocate elderly couples first (priority group)"

    # Patterns to allocate in this round
    # Use the same format as in households.csv headers
    patterns:
      - "0 0 0 2"      # 2 old adults
      - "0 0 0 >=3"    # 3+ old adults

    # Maximum households to create in this round (null = no limit)
    max_households: null

    # Refresh person pools before this round?
    # Set to true if you've done other allocations between rounds
    refresh_pools: false

    # Enable demotion for this round (overrides global config)
    # If null, uses global demotion settings
    enable_demotion: null

  # =============================================
  # Round 2: Families with Children
  # =============================================
  - name: "Families with Children"
    description: "Allocate families with kids (2-parent and single-parent)"

    patterns:
      - ">=2 >=0 2 0"   # 2+ kids, 2 adults
      - "1 >=0 2 0"     # 1 kid, 2 adults
      - ">=2 >=0 1 0"   # 2+ kids, 1 adult (single parent)
      - "1 >=0 1 0"     # 1 kid, 1 adult (single parent)

    max_households: null
    refresh_pools: false
    enable_demotion: null

  # =============================================
  # Round 3: Adult-Only Households
  # =============================================
  - name: "Adult-Only Households"
    description: "Allocate adult couples and singles (no kids, no elderly)"

    patterns:
      - "0 0 2 0"       # 2 adults
      - "0 0 1 0"       # 1 adult
      - "0 >=1 2 0"     # Young adults + 2 adults
      - "0 >=1 1 0"     # Young adults + 1 adult

    max_households: null
    refresh_pools: false
    enable_demotion: null

  # =============================================
  # Round 4: Young Adult Households
  # =============================================
  - name: "Young Adult Households"
    description: "Allocate young adult roommates and couples"

    patterns:
      - "0 >=0 0 0"     # Young adults only (any number)

    max_households: null
    refresh_pools: false
    enable_demotion: null

  # =============================================
  # Round 5: Mixed/Flexible Households
  # =============================================
  - name: "Mixed and Flexible Households"
    description: "Allocate remaining flexible household types"

    patterns:
      - "1 >=0 >=0 >=0"   # 1 kid, any other combo
      - ">=2 >=0 >=0 >=0" # 2+ kids, any other combo

    max_households: null
    refresh_pools: false
    enable_demotion: null

  # =============================================
  # Final Round: All Remaining
  # =============================================
  - name: "Final Cleanup"
    description: "Allocate all remaining people to any compatible household"

    # null or empty list means "all patterns"
    patterns: null

    max_households: null

    # Good practice to refresh before final round
    refresh_pools: true

    enable_demotion: null

# =============================================
# ALTERNATIVE SIMPLE CONFIGURATION
# =============================================
# If you just want priority ordering without complex filtering:
#
# rounds:
#   - name: "Priority 1"
#     patterns: ["0 0 0 2", "0 0 0 >=3"]
#     max_households: null
#
#   - name: "Priority 2"
#     patterns: [">=2 >=0 2 0", "1 >=0 2 0"]
#     max_households: null
#
#   - name: "Everything Else"
#     patterns: null  # All remaining patterns
#     refresh_pools: true

# =============================================
# ALTERNATIVE WITH LIMITS
# =============================================
# Gradual allocation with household limits:
#
# rounds:
#   - name: "Batch 1"
#     patterns: null
#     max_households: 5000
#
#   - name: "Batch 2"
#     patterns: null
#     max_households: 5000
#
#   - name: "Batch 3"
#     patterns: null
#     max_households: 5000
#
#   - name: "Final Batch"
#     patterns: null
#     max_households: null  # No limit on final round

# =============================================
# NOTES
# =============================================
#
# Pattern Syntax:
#   - Exact count: "2" means exactly 2 people
#   - Flexible: ">=2" means 2 or more people
#   - Zero: "0" means zero people
#   - Format: "<kids> <young_adults> <adults> <old_adults>"
#
# When to use refresh_pools=true:
#   - After allocating people to venues between rounds
#   - Before final cleanup rounds
#   - When you want to ensure pools only contain unallocated people
#
# Tips:
#   - Earlier rounds have first pick of people
#   - Use specific patterns for priority groups
#   - Use patterns=null for "catch all remaining"
#   - Set max_households to control allocation rate
