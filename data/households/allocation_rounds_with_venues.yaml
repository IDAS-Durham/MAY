# Multi-Round Allocation with Venue Integration
#
# This configuration shows how to interleave household allocation
# with venue allocation (care homes, dorms, etc.)

enabled: true

rounds:
  # =============================================
  # Round 1: Families with Children
  # =============================================
  - name: "Families with Children"
    description: "Allocate families first (high priority)"
    patterns:
      - ">=2 >=0 2 0"   # 2+ kids, 2 adults
      - "1 >=0 2 0"     # 1 kid, 2 adults
      - ">=2 >=0 1 0"   # 2+ kids, 1 adult (single parent)
      - "1 >=0 1 0"     # 1 kid, 1 adult (single parent)
    max_households: null
    refresh_pools: false

  # =============================================
  # VENUE ALLOCATION HAPPENS HERE
  # =============================================
  # After this round, call:
  #   from venue_allocator import allocate_people_to_venues
  #   allocate_people_to_venues(geo, pop, venues, households)
  #
  # This will allocate elderly to care homes, students to dorms, etc.
  # based on data/venues/venue_allocation.yaml
  #
  # The venue allocator automatically marks people as allocated,
  # so the next household round won't try to use them.
  # =============================================

  # =============================================
  # Round 2: Adult-Only Households
  # =============================================
  - name: "Adult-Only Households"
    description: "Allocate adult couples and singles (after venue allocation)"
    patterns:
      - "0 0 2 0"       # 2 adults
      - "0 0 1 0"       # 1 adult
      - "0 >=1 2 0"     # Young adults + 2 adults
      - "0 >=1 1 0"     # Young adults + 1 adult
    max_households: null
    refresh_pools: true  # ✅ IMPORTANT! Excludes people in care homes/dorms

  # =============================================
  # Round 3: Elderly Couples (not in care homes)
  # =============================================
  - name: "Elderly Couples"
    description: "Allocate remaining elderly to household couples"
    patterns:
      - "0 0 0 2"       # 2 old adults
      - "0 0 0 >=3"     # 3+ old adults
    max_households: null
    refresh_pools: false

  # =============================================
  # Round 4: Final Cleanup
  # =============================================
  - name: "Final Cleanup"
    description: "Allocate all remaining people to any compatible household"
    patterns: null  # All remaining patterns
    max_households: null
    refresh_pools: true  # Good practice before final round

# =============================================
# USAGE INSTRUCTIONS
# =============================================
#
# To use this configuration with venue allocation:
#
# 1. In your script (or create_world.py):
#
#    # Allocate Round 1 (Families)
#    households.distribute_households_round(...)
#
#    # Allocate to venues
#    from venue_allocator import allocate_people_to_venues
#    allocate_people_to_venues(geo, population, venues, households)
#
#    # Continue with remaining household rounds
#    households.distribute_households_round(...)
#
# 2. Or use the YAML-based allocation but call venue allocation manually:
#
#    # This will run Round 1 only
#    stats = households.distribute_households_round(
#        pattern_filter=[">=2 >=0 2 0", "1 >=0 2 0", ...],
#        round_name="Families"
#    )
#
#    # Allocate venues
#    allocate_people_to_venues(...)
#
#    # Continue with Round 2+ (with refresh_pools=true)
#    stats = households.distribute_households_round(
#        pattern_filter=["0 0 2 0", ...],
#        refresh_pools=True,
#        round_name="Adults"
#    )
#
# The key is:
#   - venue_allocator.allocate_people_to_venues() marks people as allocated
#   - Next household round uses refresh_pools=True
#   - System excludes venue residents from household pools
