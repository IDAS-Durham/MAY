# Household Creation Rules Configuration
# Defines how to construct households based on composition patterns
# Uses explicit category names for precise pattern matching
# Roles are still used for constraints (age gaps, relationships)

# Rule matching and allocation system
household_creation_rules:

  # ============================================================================
  # RULE 1: Family with Kids + 2 Adults (Nuclear Family)
  # ============================================================================
  # Matches patterns like: "2 0 2 0" (2 kids + 2 adults)
  #                        ">=2 >=0 2 0" (2+ kids + 2 adults)
  #                        "1 0 2 0" (1 kid + 2 adults)
  - name: "nuclear_family"
    description: "Nuclear family: kids + 2 adults (parents)"
    priority: 1  # Highest priority

    # Pattern matching: must have kids AND exactly 2 adults
    pattern_match:
      type: "category_name"
      conditions:
        - category_name: "kid"
          operator: ">"
          value: 0
        - category_name: "adult"
          operator: "=="
          value: 2

    # Allocation sequence
    allocation_sequence:
      # STEP 1: Allocate kids first
      - step: 1
        description: "Allocate children"
        category_name: "kid"
        count: "minimum_required"
        selection_method: "random"
        constraints: []

      # STEP 2: Allocate first adult (primary parent)
      - step: 2
        description: "Allocate first parent"
        category_name: "adult"
        count: 1
        selection_method: "best_match"
        constraints:
          - type: "age_gap"
            description: "First parent must have appropriate age gap with oldest child"
            reference_category_role: "priority"
            reference_selection: "oldest"
            config_key: "parent_child.primary_parent"
            required: true
            fallback_config_key: "parent_child.emergency"

      # STEP 3: Allocate second adult (second parent)
      - step: 3
        description: "Allocate second parent"
        category_name: "adult"
        count: 1
        selection_method: "best_match"
        constraints:
          - type: "age_gap"
            description: "Second parent must have appropriate age gap with oldest child"
            reference_category_role: "priority"
            reference_selection: "oldest"
            config_key: "parent_child.secondary_parent"
            required: true
            fallback_config_key: "parent_child.emergency"

          - type: "age_gap"
            description: "Parents should have compatible ages"
            reference_step: 2
            config_key: "partners"
            required: false  # Soft constraint

          - type: "sex_preference"
            description: "Prefer opposite sex for couples"
            reference_step: 2
            config_key: "partners.opposite_sex_preference"
            probability: 0.95
            required: false

  # ============================================================================
  # RULE 2: Single Parent Family (Kids + 1 Adult)
  # ============================================================================
  # Matches patterns like: "2 0 1 0" (2 kids + 1 adult)
  #                        ">=2 >=0 1 0" (2+ kids + 1 adult)
  - name: "single_parent_family"
    description: "Single parent with children"
    priority: 2

    pattern_match:
      type: "category_name"
      conditions:
        - category_name: "kid"
          operator: ">"
          value: 0
        - category_name: "adult"
          operator: "=="
          value: 1

    allocation_sequence:
      - step: 1
        description: "Allocate children"
        category_name: "kid"
        count: "minimum_required"
        selection_method: "random"

      - step: 2
        description: "Allocate single parent"
        category_name: "adult"
        count: 1
        selection_method: "best_match"
        constraints:
          - type: "age_gap"
            reference_category_role: "priority"
            reference_selection: "oldest"
            config_key: "parent_child.primary_parent"
            required: true
            fallback_config_key: "parent_child.emergency"

  # ============================================================================
  # RULE 3: Multi-Generational Family (Kids + Adults + Elders)
  # ============================================================================
  # Matches patterns like: "2 0 2 1" (2 kids + 2 adults + 1 elder)
  #                        ">=2 >=0 2 >=1" (2+ kids + 2 adults + 1+ elder)
  - name: "multigenerational_family"
    description: "Multi-generational family with kids, parents, and grandparents"
    priority: 3

    pattern_match:
      type: "category_name"
      conditions:
        - category_name: "kid"
          operator: ">"
          value: 0
        - category_name: "adult"
          operator: ">"
          value: 0
        - category_name: "elder"
          operator: ">"
          value: 0

    allocation_sequence:
      # Kids first
      - step: 1
        description: "Allocate children"
        category_name: "kid"
        count: "minimum_required"
        selection_method: "random"

      # Parents
      - step: 2
        description: "Allocate parents"
        category_name: "adult"
        count: "minimum_required"
        selection_method: "best_match"
        constraints:
          - type: "age_gap"
            reference_category_role: "priority"
            reference_selection: "oldest"
            config_key: "parent_child.primary_parent"
            required: true

      # Grandparents
      - step: 3
        description: "Allocate grandparents"
        category_name: "elder"
        count: "minimum_required"
        selection_method: "best_match"
        constraints:
          - type: "age_gap"
            reference_category_role: "priority"
            reference_selection: "oldest"
            config_key: "grandparent_grandchild"
            required: true

  # ============================================================================
  # RULE 4: Adult Couple (No Kids, 2 Adults)
  # ============================================================================
  # Matches patterns like: "0 0 2 0" (2 adults, no kids)
  - name: "adult_couple"
    description: "Two-adult household (couple without children)"
    priority: 4

    pattern_match:
      type: "category_name"
      conditions:
        - category_name: "kid"
          operator: "=="
          value: 0
        - category_name: "adult"
          operator: "=="
          value: 2

    allocation_sequence:
      - step: 1
        description: "Allocate first adult"
        category_name: "adult"
        count: 1
        selection_method: "random"

      - step: 2
        description: "Allocate second adult"
        category_name: "adult"
        count: 1
        selection_method: "best_match"
        constraints:
          - type: "age_gap"
            reference_step: 1
            config_key: "partners"
            required: false

          - type: "sex_preference"
            reference_step: 1
            config_key: "partners.opposite_sex_preference"
            probability: 0.99
            required: false

  # ============================================================================
  # RULE 5: Single Adult Living Alone
  # ============================================================================
  # Matches patterns like: "0 0 1 0" (1 adult alone)
  - name: "single_adult"
    description: "Single adult living alone"
    priority: 5

    pattern_match:
      type: "category_name"
      conditions:
        - category_name: "kid"
          operator: "=="
          value: 0
        - category_name: "young_adult"
          operator: "=="
          value: 0
        - category_name: "adult"
          operator: "=="
          value: 1
        - category_name: "elder"
          operator: "=="
          value: 0

    allocation_sequence:
      - step: 1
        description: "Allocate single adult"
        category_name: "adult"
        count: 1
        selection_method: "random"

  # ============================================================================
  # RULE 6: Elderly Couple (No Kids, 2 Elders)
  # ============================================================================
  # Matches patterns like: "0 0 0 2" (2 elders)
  - name: "elderly_couple"
    description: "Elderly couple living together"
    priority: 6

    pattern_match:
      type: "category_name"
      conditions:
        - category_name: "kid"
          operator: "=="
          value: 0
        - category_name: "elder"
          operator: "=="
          value: 2

    allocation_sequence:
      - step: 1
        description: "Allocate first elder"
        category_name: "elder"
        count: 1
        selection_method: "random"

      - step: 2
        description: "Allocate second elder"
        category_name: "elder"
        count: 1
        selection_method: "best_match"
        constraints:
          - type: "age_gap"
            reference_step: 1
            config_key: "partners"
            required: false

          - type: "sex_preference"
            reference_step: 1
            config_key: "partners.opposite_sex_preference"
            probability: 0.95
            required: false

  # ============================================================================
  # RULE 7: Single Elder Living Alone
  # ============================================================================
  # Matches patterns like: "0 0 0 1" (1 elder alone)
  - name: "single_elder"
    description: "Single elderly person living alone"
    priority: 7

    pattern_match:
      type: "category_name"
      conditions:
        - category_name: "kid"
          operator: "=="
          value: 0
        - category_name: "young_adult"
          operator: "=="
          value: 0
        - category_name: "adult"
          operator: "=="
          value: 0
        - category_name: "elder"
          operator: "=="
          value: 1

    allocation_sequence:
      - step: 1
        description: "Allocate single elder"
        category_name: "elder"
        count: 1
        selection_method: "random"

  # ============================================================================
  # RULE 8: Young Adult Shared Housing
  # ============================================================================
  # Matches patterns like: "0 2 0 0" (2 young adults)
  #                        "0 >=1 0 0" (1+ young adults)
  - name: "young_adult_shared"
    description: "Young adults sharing a household (roommates, students, etc.)"
    priority: 8

    pattern_match:
      type: "category_name"
      conditions:
        - category_name: "kid"
          operator: "=="
          value: 0
        - category_name: "young_adult"
          operator: ">"
          value: 0
        - category_name: "adult"
          operator: "=="
          value: 0
        - category_name: "elder"
          operator: "=="
          value: 0

    allocation_sequence:
      - step: 1
        description: "Allocate young adults"
        category_name: "young_adult"
        count: "minimum_required"
        selection_method: "random"

  # ============================================================================
  # RULE 9: Mixed Adult/Young Adult Household
  # ============================================================================
  # Matches patterns like: "0 1 1 0" (1 young adult + 1 adult)
  #                        "0 >=1 >=1 0" (1+ young adult + 1+ adult)
  - name: "mixed_adult_household"
    description: "Mixed household with young adults and adults (no kids)"
    priority: 9

    pattern_match:
      type: "category_name"
      conditions:
        - category_name: "kid"
          operator: "=="
          value: 0
        - category_name: "young_adult"
          operator: ">"
          value: 0
        - category_name: "adult"
          operator: ">"
          value: 0

    allocation_sequence:
      - step: 1
        description: "Allocate young adults"
        category_name: "young_adult"
        count: "minimum_required"
        selection_method: "random"

      - step: 2
        description: "Allocate adults"
        category_name: "adult"
        count: "minimum_required"
        selection_method: "random"

  # ============================================================================
  # RULE 10: Fallback (Simple Allocation)
  # ============================================================================
  # Matches any pattern not caught by above rules
  # Uses simple allocation to fallback
  - name: "simple_fallback"
    description: "Fallback for unmatched patterns - uses simple allocation"
    priority: 999  # Lowest priority - only use if nothing else matches

    pattern_match:
      type: "always"  # Always matches

    allocation_sequence: []  # Empty - will trigger fallback to simple_allocate

# ============================================================================
# Composition Assumptions
# ============================================================================
# Defines assumptions about ambiguous household compositions.
#
# PROBLEM: Some compositions only specify "certain" members (non->= values)
# but lack guaranteed supervision or differentiation from other patterns.
#
# SOLUTION: Add minimum required people based on social/practical assumptions
# to make compositions valid and unique.
#
# How it works:
# 1. Pattern is checked against assumptions list
# 2. If match found, minimum_additions are applied
# 3. Resulting pattern must be unique (not conflict with existing patterns)
# 4. Applied during Stage 1 allocation before attempting to create household
composition_assumptions:

  # ============================================================================
  # ASSUMPTION 1: Kids with flexible supervision (>=2 >=0 >=0 >=0)
  # ============================================================================
  - pattern: ">=2 >=0 >=0 >=0"
    certain_composition: "2 0 0 0"  # Only kids guaranteed

    assumption: |
      Kids cannot live alone - need adult supervision.
      HOWEVER: Adding 1 adult would create ">=2 >=0 1 0" which already exists.
      Therefore, this must represent a DIFFERENT household type:
      - Skip-generation household (grandparents raising grandchildren)
      - Extended family without middle generation

    minimum_additions:
      kid: 0          # Already have >=2
      young_adult: 0  # None needed
      adult: 1        # Guardian/caretaker
      elder: 1        # Differentiator (grandparent)

    resulting_minimum: ">=2 >=0 1 1"

    reasoning: |
      This pattern becomes distinct from single-parent families by including
      an elder, suggesting a skip-generation household (grandparents raising
      grandchildren without parents present).

  # ============================================================================
  # ASSUMPTION 2: Young adults with anyone flexible (>=0 >=2 >=0 >=0)
  # ============================================================================
  - pattern: ">=0 >=2 >=0 >=0"
    certain_composition: "0 2 0 0"  # Only young adults guaranteed

    assumption: |
      Young adults (18-25) can live independently. No additional supervision
      needed - they are legal adults. Common scenario: roommates, student housing.

    minimum_additions: {}  # No additions needed - pattern is valid as-is

    resulting_minimum: ">=0 >=2 >=0 >=0"  # No change

    reasoning: |
      Young adults are independent and form valid households without additional
      supervision. This is a common and realistic household type.

  # ============================================================================
  # ASSUMPTION 3: Kids with young adults (>=2 >=1 >=0 >=0)
  # ============================================================================
  - pattern: ">=2 >=1 >=0 >=0"
    certain_composition: "2 1 0 0"  # Kids + young adults

    assumption: |
      Kids need proper adult supervision. A young adult (18-25) alone is
      insufficient as guardian. Young adult might be older sibling but
      household still needs proper adult guardian.

    minimum_additions:
      kid: 0          # Already have >=2
      young_adult: 0  # Already have >=1
      adult: 1        # Add guardian/parent figure
      elder: 0        # None needed

    resulting_minimum: ">=2 >=1 1 0"

    reasoning: |
      Represents household where young adult is older sibling/relative
      but proper adult guardian is required for minor children.

  # ============================================================================
  # ASSUMPTION 4: Fully flexible - skip in Stage 1 (>=0 >=0 >=0 >=0)
  # ============================================================================
  - pattern: ">=0 >=0 >=0 >=0"
    certain_composition: "0 0 0 0"  # Nothing certain!

    assumption: |
      Completely flexible pattern with NO guaranteed members.
      This is a RESIDUAL/EMERGENCY category for Stage 3.
      Cannot process in Stage 1 because we don't know what to allocate.

    minimum_additions: null  # Skip entirely in Stage 1

    resulting_minimum: null  # Will be handled in Stage 3 as emergency households

    reasoning: |
      Pattern has no certain members and represents leftover/unallocated people.
      Should only be processed in Stage 3 as emergency/catchall households.

  # ============================================================================
  # ASSUMPTION 5: Only kids certain - no other info (e.g., ">=3 >=0 >=0 >=0")
  # ============================================================================
  # NOTE: This is the same as ASSUMPTION 1, just documenting that it applies
  # to ANY pattern with only kids certain (>=2, >=3, >=4, etc.)
  - pattern: ">=3 >=0 >=0 >=0"
    certain_composition: "3 0 0 0"

    assumption: "Same logic as >=2 >=0 >=0 >=0 - needs supervision + differentiation"

    minimum_additions:
      kid: 0
      young_adult: 0
      adult: 1
      elder: 1

    resulting_minimum: ">=3 >=0 1 1"

    reasoning: "Skip-generation household with more children"

  # ============================================================================
  # ASSUMPTION 6: Single kid with flexible everything (1 >=0 >=0 >=0)
  # ============================================================================
  - pattern: "1 >=0 >=0 >=0"
    certain_composition: "1 0 0 0"  # Only 1 kid guaranteed

    assumption: |
      Single kid needs adult supervision. Adding just 1 adult would create
      "1 >=0 1 >=0" but this is too ambiguous. Adding elder makes it distinct.

    minimum_additions:
      kid: 0          # Already have 1
      young_adult: 0  # None needed
      adult: 1        # Guardian/parent
      elder: 1        # Differentiator

    resulting_minimum: "1 >=0 1 1"

    reasoning: |
      Skip-generation household with single grandchild being raised by
      grandparents, or similar multi-generational arrangement.

# Composition Assumptions Configuration
composition_assumptions_config:
  # When to apply assumptions
  apply_in_stage: "stage1"  # Apply before attempting household creation

  # Validation
  validate_uniqueness: true  # Ensure resulting patterns don't conflict
  error_on_conflict: true    # Raise error if resulting pattern already exists elsewhere

  # Logging
  log_assumptions_applied: true      # Log when assumption is applied
  log_resulting_patterns: true       # Show the transformed pattern
  log_skipped_patterns: true         # Log patterns skipped (like >=0 >=0 >=0 >=0)

  # Behavior
  skip_if_no_assumption: false  # If no assumption found, process pattern as-is
  allow_pattern_override: false # Don't allow manual override of assumptions

# Allocation behavior configuration
allocation_behavior:
  # What to do when constraints cannot be satisfied
  on_constraint_failure:
    mode: "relax_and_retry"  # Options: "skip", "relax_and_retry", "warn_and_create"
    max_retries: 10
    retry_strategy: "relax_least_important_first"

  # Selection methods
  selection_methods:
    random:
      description: "Pick random person from filtered pool"

    best_match:
      description: "Pick person that best satisfies all constraints"
      scoring:
        perfect_match: 100
        soft_constraint_violation: -20
        hard_constraint_violation: 0  # Disqualifies candidate
        preferred_value_bonus: 10

    oldest_first:
      description: "Pick oldest person from filtered pool"

    youngest_first:
      description: "Pick youngest person from filtered pool"

  # Logging and debugging
  logging:
    log_rule_selection: true
    log_constraint_checks: false  # Set to true for debugging
    log_allocation_failures: true
    log_fallback_usage: true
