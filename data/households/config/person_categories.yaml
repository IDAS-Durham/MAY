# Person Category Configuration for June Zero Households
# Generic system that can be adapted for any geography, time period, or culture
# Categories can be age-based, social class, occupation, or anything else

# Standard categories: Age-based (UK 2021 census)
person_categories:
  - name: "kid"
    symbol: "K"          # Used in composition patterns (e.g., "2K" = 2 kids)
    min_age: 0
    max_age: 17
    description: "Children and adolescents"
    roles:
      - "dependent"       # Requires care from others
      - "priority"        # Priority category for household allocation
      - "child"           # For parent-child relationship constraints

  - name: "young_adult"
    symbol: "YA"
    min_age: 18
    max_age: 25
    description: "Young adults (university age, early career)"
    roles:
      - "independent"     # Can live independently
      - "child"

  - name: "adult"
    symbol: "A"
    min_age: 26
    max_age: 64
    description: "Working-age adults"
    roles:
      - "independent"     # Can live independently
      - "caregiver"       # Primary caregiver for dependents
      - "parent"          # Can be parent to children
      - "partner"         # Can form partnerships/couples
      - "worker"          # Working age

  - name: "elder"
    symbol: "E"
    min_age: 65
    max_age: 120
    description: "Elderly (retirement age and above)"
    roles:
      - "independent"     # Can live independently (mostly)
      - "grandparent"     # Can be grandparent to children
      - "partner"         # Can form partnerships/couples
      - "potential_dependent"  # May require care in some cases

# Alternative category definitions for different scenarios
# Set enabled: true and copy to person_categories section to use

alternative_categories:
  # Historical Victorian era (age-based)
  victorian_age:
    enabled: false
    categories:
      - name: "kid"
        symbol: "K"
        min_age: 0
        max_age: 13
      - name: "youth"
        symbol: "Y"
        min_age: 14
        max_age: 20
      - name: "adult"
        symbol: "A"
        min_age: 21
        max_age: 49
      - name: "elder"
        symbol: "E"
        min_age: 50
        max_age: 100

  # Social class based (historical aristocracy)
  social_class:
    enabled: false
    categorization_type: "property"  # Not age-based, uses person.social_class property
    categories:
      - name: "noble"
        symbol: "N"
        description: "Nobility and aristocracy"
        property_key: "social_class"
        property_value: "noble"

      - name: "freeman"
        symbol: "F"
        description: "Free citizens"
        property_key: "social_class"
        property_value: "freeman"

      - name: "servant"
        symbol: "S"
        description: "Household servants"
        property_key: "social_class"
        property_value: "servant"

      - name: "slave"
        symbol: "SL"
        description: "Enslaved persons"
        property_key: "social_class"
        property_value: "slave"

  # Future scenario (extended lifespans, still age-based)
  future_age:
    enabled: false
    categorization_type: "age"
    categories:
      - name: "kid"
        symbol: "K"
        min_age: 0
        max_age: 17
      - name: "young_adult"
        symbol: "YA"
        min_age: 18
        max_age: 30
      - name: "adult"
        symbol: "A"
        min_age: 31
        max_age: 79
      - name: "elder"
        symbol: "E"
        min_age: 80
        max_age: 150

# Category type
categorization_type: "age"  # "age" or "property"
# - age: Categories based on person.age (min_age/max_age)
# - property: Categories based on person properties (property_key/property_value)

# Validation rules
validation:
  # For age-based categories
  check_continuity: true        # Ensure no age gaps between categories (age-based only)
  check_overlap: true           # Ensure no overlapping age ranges (age-based only)

  # General validation
  min_categories: 2             # Minimum number of categories required
  max_categories: 10            # Maximum number of categories supported

  # CRITICAL: Composition pattern validation
  enforce_pattern_consistency: true
  # Pattern format MUST match number of categories
  # Example: 4 categories (kid, young_adult, adult, elder) → pattern must have 4 values
  # If you add/remove categories, all composition patterns must be updated

# Pattern format specification
pattern_format:
  # Current format: "{kid_count} {young_adult_count} {adult_count} {elder_count}"
  # Number of values MUST equal number of categories
  expected_values: 4  # Auto-calculated from len(person_categories)

  # Value types
  # - Integer: exact count (e.g., "2" = exactly 2 people)
  # - >=Integer: minimum count (e.g., ">=2" = 2 or more people)
  # - >=0: expandable (can add unlimited people of this category)

  # Order MUST match person_categories order (kid, young_adult, adult, elder)
  order_matches_categories: true

  # Example patterns (age-based):
  # "2 0 2 0" = 2 kids, 0 young adults, 2 adults, 0 elders (nuclear family)
  # "1 >=0 2 0" = 1 kid, any young adults, 2 adults, 0 elders (expandable family)
  # ">=2 >=0 >=0 >=0" = 2+ kids, fully expandable (large/complex family)
  # "0 >=0 >=0 >=0" = no kids, fully flexible (adult-only household)

  # Example patterns (social class-based):
  # "1 2 3 0" = 1 noble, 2 freemen, 3 servants, 0 slaves
  # "1 0 >=2 0" = 1 noble, 0 freemen, 2+ servants, 0 slaves (wealthy household)
