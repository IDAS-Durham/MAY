# Activity Configuration for Medieval England (circa 1348)
# Organized by activity type for easy modification

settings:
  world_type: "medieval_england"
  year: 1348
  description: "Pre-Black Death England activity patterns"

# Activity definitions
activity_definitions:
  home:
    description: "Household residence"
    venue_types: ["household"]
    required: true

  work:
    description: "Labor and employment"
    venue_types: ["farm", "workshop", "manor"]
    required: false

  domestic_work:
    description: "Household economic activities"
    venue_types: ["household"]
    required: false

  church:
    description: "Religious attendance"
    venue_types: ["church", "monastery"]
    required: false

  manor_service:
    description: "Service to lord's manor"
    venue_types: ["manor"]
    required: false

  trade:
    description: "Craft and trade activities"
    venue_types: ["workshop", "market"]
    required: false

# Activity rules organized by activity type
activities:
  # HOME ACTIVITY
  home:
    rules:
      - name: "Universal household membership"
        conditions: {}
        probability: 1.0
        enabled: true

  # DOMESTIC_WORK ACTIVITY
  domestic_work:
    rules:
      - name: "Children helping at home"
        conditions:
          age: [7, 15]
        probability: 0.85
        enabled: true
        metadata:
          notes: "Children assist with household work from young age"

      - name: "Adult women - domestic economy"
        conditions:
          age: [16, 55]
          sex: "female"
        probability: 0.95
        enabled: true
        metadata:
          notes: "Women manage household production"

  # WORK ACTIVITY
  work:
    rules:
      - name: "Adult men - agricultural work"
        conditions:
          age: [16, 60]
          sex: "male"
        probability: 0.88
        enabled: true
        metadata:
          notes: "Most men work in agriculture or trades"

      - name: "Adult women - textile work"
        conditions:
          age: [16, 50]
          sex: "female"
        probability: 0.35
        enabled: true
        metadata:
          notes: "Many women work in textile production"

      - name: "Teenage boys - apprenticeship"
        conditions:
          age: [14, 18]
          sex: "male"
        probability: 0.25
        enabled: true
        metadata:
          notes: "Some boys enter apprenticeships"

  # CHURCH ACTIVITY
  church:
    rules:
      - name: "Adult men - church attendance"
        conditions:
          age: [16, 70]
          sex: "male"
        probability: 0.80
        enabled: true
        metadata:
          notes: "Regular church attendance expected"

      - name: "Adult women - church attendance"
        conditions:
          age: [16, 70]
          sex: "female"
        probability: 0.85
        enabled: true
        metadata:
          notes: "Women attend church regularly"

      - name: "Elderly church attendance"
        conditions:
          age_min: 70
        probability: 0.90
        enabled: true
        metadata:
          notes: "Elderly increasingly devout"

  # MANOR_SERVICE ACTIVITY (for serfs)
  manor_service:
    rules:
      - name: "Adult serfs - manor obligations"
        conditions:
          age: [16, 60]
          properties:
            social_status: "serf"
        probability: 0.95
        enabled: false  # Disabled by default, enable if modeling feudal obligations
        metadata:
          notes: "Serfs owe labor service to lord"

  # TRADE ACTIVITY
  trade:
    rules:
      - name: "Adult craftsmen"
        conditions:
          age: [20, 60]
          sex: "male"
          properties:
            occupation_type: "artisan"
        probability: 0.90
        enabled: false  # Enable if modeling occupation types
        metadata:
          notes: "Craftsmen work in their trade"
