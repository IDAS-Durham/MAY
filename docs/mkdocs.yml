site_name: MAY Docs

hooks:
  - hooks.py

plugins:
  - mkdocstrings:
      handlers:
        python:
          paths: [../.]
          options:
            show_submodules: true
            allow_inspection: true
            relative_crossrefs: true
  - autorefs
  - search
  - awesome-nav

extra_css:
  - assets/stylesheets/logo.css

theme:
  name: material
  logo: assets/images/May_docs_white_path.svg
  palette:
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: deep-purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

validation:
  links:
    not_found: ignore