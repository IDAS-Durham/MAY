# ============================================================================
# Romantic/Sexual Relationship Configuration (Simplified)
# ============================================================================
# This configuration only defines sexual orientations and storage keys.
# actual matching is handled by pre-existing cohabiting couple status.
# ============================================================================

name: "romantic_relationships"

# General Constraints
min_age: 18
max_age: 75

# Sexual Orientation Configuration
sexual_orientations:
  types:
    - heterosexual
    - homosexual
    - bisexual

  probabilities:
    male:
      heterosexual: 0.90
      homosexual: 0.05
      bisexual: 0.05
    female:
      heterosexual: 0.85
      homosexual: 0.05
      bisexual: 0.10

  age_adjustments:
    "18-25":
      bisexual: 1.3
    "65-74":
      homosexual: 0.7
      bisexual: 0.5
    "75+":
      homosexual: 0.7
      bisexual: 0.5

  compatibility:
    heterosexual:
      male: [female]
      female: [male]
    homosexual:
      male: [male]
      female: [female]
    bisexual:
      male: [male, female]
      female: [male, female]

# Storage Configuration
storage:
  orientation_key: "sexual_orientation"
  status_key: "relationship_status"