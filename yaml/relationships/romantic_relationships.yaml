# ============================================================================
# Romantic/Sexual Relationship Configuration
# ============================================================================
# This configuration defines how romantic and sexual relationships are
# distributed in the population. All parameters are configurable and generic.
#
# IMPORTANT: This config is culturally and geographically neutral. Adjust
# probabilities and constraints to match your specific context.
# ============================================================================

name: "romantic_relationships"

# Enable/disable romantic relationships entirely
# When false, skips all romantic relationship distribution (including household couples)
enabled: false

# ============================================================================
# Sexual Orientation Configuration
# ============================================================================
# Define the probabilities of different sexual orientations by demographic.

sexual_orientations:
  # Orientation types (fully configurable - add/remove as needed)
  types:
    - heterosexual
    - homosexual
    - bisexual

  # Base probabilities by sex (must sum to 1.0 for each sex)
  probabilities:
    male:
      heterosexual: 0.95
      homosexual: 0.03
      bisexual: 0.02
    female:
      heterosexual: 0.93
      homosexual: 0.02
      bisexual: 0.05

  # Optional: Age-based adjustments (multipliers applied to base probabilities)
  age_adjustments:
    "18-25":
      bisexual: 1.3       # Younger cohorts more likely to identify as bisexual
    "65+":
      homosexual: 0.7     # Older cohorts less likely (due to historical stigma, not biology)
      bisexual: 0.5

# ============================================================================
# Compatibility Rules
# ============================================================================
# Define which orientations are compatible with which sexes.
# This is the ONLY place where orientation logic is defined.

compatibility_rules:
  heterosexual:
    male: [female]
    female: [male]

  homosexual:
    male: [male]
    female: [female]

  bisexual:
    male: [male, female]
    female: [male, female]

# ============================================================================
# Relationship Types
# ============================================================================
# Define different types of romantic relationships and their probabilities.

relationship_types:
  # Base probabilities for adults (must sum to 1.0)
  base_probabilities:
    no_partner: 0.30
    exclusive: 0.60
    non_exclusive: 0.10

  # Age-based multipliers (applied to base probabilities)
  age_multipliers:
    "18-25":
      non_exclusive: 2.0      # Young adults more open to non-monogamy
      no_partner: 0.8         # Less likely to be single
      exclusive: 1.1
    "26-35":
      exclusive: 1.3          # Peak partnering years
      no_partner: 0.7
    "36-50":
      exclusive: 1.2
      non_exclusive: 0.8
    "51-64":
      no_partner: 1.1
      non_exclusive: 0.6
    "65+":
      no_partner: 1.4         # More likely to be single (widowed, etc.)
      non_exclusive: 0.3
      exclusive: 0.8

# ============================================================================
# Partner Limits
# ============================================================================
# Maximum number of partners by relationship type, age, and sex.

partner_limits:
  # Exclusive relationships: always exactly 1 partner
  exclusive:
    default: 1

  # Non-exclusive (consensual non-monogamy) relationships
  non_exclusive:
    # Define limits by age group and sex
    by_age_and_sex:
      "18-25":
        male: 3
        female: 3
      "26-35":
        male: 3
        female: 2
      "36-50":
        male: 2
        female: 2
      "51-64":
        male: 1
        female: 1
      "65+":
        male: 1
        female: 1

  # Cheating (non-consensual additional partners)
  cheating:
    default: 1  # Most cheaters have 1 affair
    by_age_and_sex:
      "18-25":
        male: 2
        female: 2
      "26-35":
        male: 1
        female: 1

# ============================================================================
# Cheating/Infidelity Configuration
# ============================================================================
# Probability that someone in an exclusive relationship will cheat.

cheating:
  # Base probability (applied to people in exclusive relationships)
  base_probability: 0.30

  # Age-based multipliers
  age_multipliers:
    "18-25": 1.5    # Young adults more impulsive
    "26-35": 1.2
    "36-50": 1.0
    "51-64": 0.7
    "65+": 0.3      # Elderly less likely

# ============================================================================
# Age Difference Constraints
# ============================================================================
# Acceptable age differences between romantic partners by age group.

age_differences:
  # For each age group, define min/max acceptable difference
  # and preferred distribution parameters

  "18-25":
    min: 0          # Minimum age difference
    max: 5          # Maximum age difference
    preferred_mean: 2.5   # Mean of preferred distribution
    preferred_std: 2.0    # Std of preferred distribution

  "26-35":
    min: 0
    max: 8
    preferred_mean: 3.5
    preferred_std: 3.0

  "36-50":
    min: 0
    max: 12
    preferred_mean: 5.0
    preferred_std: 4.0

  "51-64":
    min: 0
    max: 15
    preferred_mean: 7.0
    preferred_std: 5.0

  "65+":
    min: 0
    max: 20
    preferred_mean: 8.0
    preferred_std: 6.0

# ============================================================================
# Compatibility Scoring
# ============================================================================
# Bonuses for different compatibility factors.
# Higher scores = more likely to be matched.

compatibility_scoring:
  base_score: 1.0

  # Geographic proximity bonuses
  same_sgu: 3.0       # Same small geographical unit (neighbors)
  same_mgu: 2.0       # Same medium geographical unit (nearby)
  same_lgu: 1.5       # Same large geographical unit (same city/region)

  # Social connection bonuses
  same_activity: 2.5      # Share primary activity (work, school, etc.)
  common_friends: 1.8     # Have mutual friends

  # Age similarity bonus
  age_similarity:
    threshold: 5          # If age diff < 5 years
    bonus: 1.5            # Apply this multiplier

  # Ethnicity compatibility (uses empirical partnership probabilities)
  ethnicity:
    enabled: true
    data_file: "data/population/ethnicity/ethnicity_partnership_probabilities.csv"
    attribute: "ethnicity"         # Person attribute to check
    # Mapping from CSV codes to system codes
    # CSV has M/O combined, system has M and O separate
    code_mapping:
      "M/O": ["M", "O"]  # Both M and O use M/O probabilities from CSV

# ============================================================================
# Storage Configuration
# ============================================================================
# Keys for storing relationship data in person.properties.

storage:
  orientation_key: "sexual_orientation"
  partners_key: "romantic_partners"
  status_key: "relationship_status"

# Storage format:
#
# person.properties['sexual_orientation'] = "heterosexual" | "homosexual" | "bisexual"
#
# person.properties['romantic_partners'] = {
#   "exclusive": [partner_id],
#   "non_exclusive": [partner_id_1, partner_id_2]
# }
#
# person.properties['relationship_status'] = {
#   "type": "exclusive" | "non_exclusive" | "no_partner",
#   "consensual": true | false
# }