# ============================================================================
# Relationship Configuration - Friendships
# ============================================================================
# This configuration defines a generic relationship network for disease modeling.
#
# People form connections based on:
#   1. Shared activity venues (same role: student-student, worker-worker)
#   2. Geographic proximity (same SGU or MGU)
#
# All terms are generic - you can rename "friendships" to anything.
# ============================================================================

# Relationship type name (user-defined, used as storage key)
name: "friendships"

# ============================================================================
# Connection Count Configuration
# ============================================================================
connections:
  # Default number of connections per person
  default: 5

  # Variants: some people have different connection counts
  # Checked in order - first matching variant wins
  variants:
    # 10% of population are "super connectors" with more connections
    - probability: 0.10
      count: 10

# ============================================================================
# Candidate Sources
# ============================================================================
# Define where to find potential connections and how to filter them.
# Weight determines proportion of connections from each source.
# Sources are processed in order.

sources:
  # ----------------------------------------
  # Source 1: Activity Peers
  # ----------------------------------------
  # People at the same primary activity venue (school, workplace, etc.)
  # with the same role (student-student, worker-worker, NOT teacher-student)
  - name: "activity_peers"
    weight: 0.6  # 60% of connections from here

    pool:
      type: "activity"
      activity_key: "primary_activity"  # Uses person.activity_map['primary_activity']

    filters:
      # Must have same role at the venue
      - attribute: "subset_name"
        match: "same"

      # Must be within age range
      - attribute: "age"
        match: "range"
        range: 5  # +/- 5 years

  # ----------------------------------------
  # Source 2: Geographic Neighbors (SGU)
  # ----------------------------------------
  # People living in the same Small Geographical Unit
  - name: "geographic_sgu"
    weight: 0.3  # 30% of connections from here

    pool:
      type: "geographic"
      level: "SGU"  # Same small geographical unit

    filters:
      # Similar age
      - attribute: "age"
        match: "range"
        range: 10  # +/- 10 years

  # ----------------------------------------
  # Source 3: Wider Community (MGU)
  # ----------------------------------------
  # Weak ties from the wider Medium Geographical Unit
  - name: "geographic_mgu"
    weight: 0.1  # 10% of connections from here

    pool:
      type: "geographic"
      level: "MGU"  # Same medium geographical unit (parent of SGU)

    filters:
      # Broader age range for weak ties
      - attribute: "age"
        match: "range"
        range: 15  # +/- 15 years

# ============================================================================
# Storage Configuration
# ============================================================================
# Connections are stored in person.properties[key] as a list of person IDs.
# Add the key name to serialization_config.yaml to include in HDF5 export.

storage:
  # Key name for storing connections in person.properties
  key: "friendships"
