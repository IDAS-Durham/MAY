# Serialization Configuration for HDF5 Export
# Specifies which properties and attributes to include in C++ world state

# =============================================
# POPULATION
# =============================================
population:
  # Core attributes (always included)
  # id, age, sex, geographical_unit are ALWAYS serialized

  # Additional properties to include from person.properties dict
  properties:
    - ethnicity           # For differential susceptibility modeling
    - comorbidities       # For disease severity modeling
    # - work_sector       # Uncomment if needed
    - work_mode         # Uncomment if needed

# =============================================
# GEOGRAPHY
# =============================================
geography:
  # Core attributes (always included)
  # id, name, level, parent/children relationships are ALWAYS serialized

  # Whether to include coordinates
  include_coordinates: true

  # Additional properties to include from geographical_unit.properties dict
  properties: []

# =============================================
# VENUES
# =============================================
venues:
  # Global venue settings
  global:
    # Core attributes (always included for ALL venues)
    # id, name, type, geographical_unit, parent/children are ALWAYS serialized

    # Whether to include coordinates for venues that have them
    include_coordinates: true

    # Whether to include is_residence flag
    include_is_residence: true

  # Per-type property configuration
  # For each venue type, specify which CSV columns / properties to keep
  types:
    household:
      properties:
        - capacity           # Number of residents (from actual allocation)
        - original_pattern   # Household composition pattern
        # - ethnicity        # Uncomment if households have ethnicity

    school:
      properties:
        - Gender             # "Mixed", "Boys", "Girls" - affects contact patterns
        # - SchoolCapacity   # Don't need - use actual student count
        # - StatutoryLowAge  # Don't need - was for allocation only
        # - StatutoryHighAge # Don't need - was for allocation only

    university:
      properties: []         # Keep minimal - just core attributes

    care_home:
      properties:
        # Don't include capacity numbers - use actual resident counts
        # Don't include slot capacities - can derive from residents
        []

    company:
      properties:
        - work_sector        # "A", "Q", etc. - might affect workplace dynamics
        # - employee_count   # Don't need - use actual worker count

    boarding_school:
      properties:
        - Gender             # If relevant for contact modeling

    student_dorms:
      properties: []

    cinema:
      properties: []

    grocery:
      properties: []

    gym:
      properties: []

    pub:
      properties: []

    # Child venues (classrooms, offices, etc.)
    classroom:
      properties:
        - capacity           # Max capacity for the room

    office:
      properties:
        - capacity

# =============================================
# SUBSETS
# =============================================
subsets:
  # Core attributes (always included)
  # venue reference, subset_index, subset_name, members are ALWAYS serialized

  # No additional properties currently
  properties: []

# =============================================
# RELATIONSHIPS
# =============================================
relationships:
  # What relationship data to include

  # Person → Venue relationships via activity_map
  include_activity_map: true

  # Venue parent-child hierarchy
  include_venue_hierarchy: true

  # Geography parent-child hierarchy
  include_geography_hierarchy: true

# =============================================
# OUTPUT SETTINGS
# =============================================
output:
  # HDF5 compression
  compression: "gzip"
  compression_level: 4

  # Whether to include metadata
  include_metadata: true

  # Metadata to include
  metadata:
    - random_seed
    - creation_timestamp
    - config_files_used
    - num_people
    - num_venues
    - num_geo_units
