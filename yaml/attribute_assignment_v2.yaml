# ============================================================================
# Streamlined Attribute Assignment Configuration (V2)
# ============================================================================
# This configuration uses a simplified, flexible approach:
# 1. Define ROLES and map them to household subsets (from household_config.yaml)
# 2. Define HOUSEHOLD STRUCTURES with flexible pattern matching
# 3. Define ASSIGNMENT RULES based on structure type and role
# ============================================================================

# ============================================================================
# Ethnicity Inheritance Rules
# ============================================================================
# These rules govern how children inherit ethnicity from parents and
# how we reverse-infer parent ethnicities from adult children.
#
# FORWARD INHERITANCE (Parent → Child):
#   W + W = W    (Same ethnicity = same ethnicity)
#   A + A = A
#   B + B = B
#   O + O = O
#   M + M = M
#
#   W + A = M    (Different ethnicities = Mixed)
#   W + B = M
#   W + O = M
#   A + B = M
#   A + O = M
#   B + O = M
#
#   M + W = M    (Mixed with anything = Mixed)
#   M + A = M
#   M + B = M
#   M + O = M
#
# REVERSE INHERITANCE (Child → Parent):
#   Child is W → Both parents must be W
#   Child is A → Both parents must be A
#   Child is B → Both parents must be B
#   Child is O → Both parents must be O
#   Child is M → Parents must be different (one is X, other is Y where X ≠ Y)
# ============================================================================

attribute:
  name: "ethnicity"
  description: "Assigns ethnicity based on household structure and roles"
  data_type: "categorical"

# ============================================================================
# Role Definitions
# ============================================================================
# Define roles and which household subsets (age categories) they apply to
# These subsets come from household_config.yaml: Kids, Young Adults, Adults, Old Adults

roles:
  primary_adult:
    description: "First adult assigned in any household"
    subsets: ["Adults"]

  secondary_adult:
    description: "Second adult (partner in couples/families)"
    subsets: ["Adults"]

  extra_adult:
    description: "Additional adults beyond primary pair"
    subsets: ["Adults"]

  primary_elder:
    description: "First elderly person"
    subsets: ["Old Adults"]

  secondary_elder:
    description: "Second elderly person"
    subsets: ["Old Adults"]

  extra_elder:
    description: "Additional elderly beyond primary pair"
    subsets: ["Old Adults"]

  independent_young:
    description: "Independent young adult"
    subsets: ["Young Adults"]

  children:
    description: "Children and dependent young adults in families"
    subsets: ["Kids", "Young Adults"]

# ============================================================================
# Household Structure Definitions
# ============================================================================
# Define the three household types with flexible pattern matching
# Pattern format: "Kids Young_Adults Adults Old_Adults"
# Operators supported: >=N, <=N, N (exact), >=0 (any)
#
# IMPORTANT: Order matters! Structures are checked in the order defined below.
# The first matching structure wins.
#
# Order:
#   1. Family (checked first - specific patterns)
#   2. Couple (checked second - specific patterns)
#   3. Independents (checked last - includes catch-all pattern "0 >=0 >=0 >=0")
#
# This prevents the broad Independents pattern from monopolizing matches.

household_structures:

  Family:
    description: "Families with children or dependent young adults"
    inheritance: true  # Children inherit from adults

    matching_rules:
      # Rule 1: Any household with at least 1 kid (regardless of original pattern)
      - actual:
          - ">=1 >=0 >=0 >=0"
        description: "Any household with kids"

      # Rule 2: Young adults with 1-2 adults, ONLY if original pattern indicated a family
      - actual:
          - "0 >=1 1 <=2"
          - "0 >=1 2 <=2"
        original:
          - ">=2 >=0 1 0"      # Kids with 1 adult (demoted to young adults)
          - ">=2 >=0 2 0"      # Kids with 2 adults (demoted to young adults)
          - "1 >=0 1 0"        # 1 kid with 1 adult (demoted)
          - "1 >=0 2 0"        # 1 kid with 2 adults (demoted)
          - ">=2 >=0 >=0 >=0"  # Multi-gen with kids (demoted)
          - "1 >=0 >=0 >=0"    # Multi-gen with 1 kid (demoted)
          - "0 >=1 1 0"        # Originally young adults with 1 adult (dependent family)
          - "0 >=1 2 0"        # Originally young adults with 2 adults (dependent family)
        description: "Young adult families (kids demoted OR originally dependent young adults)"

  Couple:
    description: "Two adults living together as a couple"
    inheritance: false

    matching_rules:
      # Adult couples - must have been originally intended as couple (not demoted family)
      - actual:
          - "0 0 2 0"
        original:
          - "0 0 2 0"
        description: "Adult couple household"

      # Elderly couples
      - actual:
          - "0 0 0 2"
        original:
          - "0 0 0 2"
        description: "Elderly couple household"

  Independents:
    description: "Independent living (singles, roommates, flexible households)"
    inheritance: false

    matching_rules:
      # Single person households
      - actual:
          - "0 0 1 0"  # Single adult
          - "0 0 0 1"  # Single elderly
        description: "Single person households"

      # Young adult groups (roommates)
      - actual:
          - "0 >=1 0 0"
        description: "Young adult roommates/housemates"

      # Multi-elderly households (3+)
      - actual:
          - "0 0 0 >=3"
        description: "Multiple elderly living together"

      # Flexible households (catch-all for other combinations)
      - actual:
          - "0 >=0 >=0 >=0"
        description: "Flexible multi-person households (no kids)"

# ============================================================================
# Data Sources
# ============================================================================
# Define where to load demographic data from

data_sources:
  geo_distribution:
    type: "csv_lookup"
    description: "Geographical unit ethnicity distributions"

    files:
      - path: "data/population/ethnicity/ethnicity_5groups_by_OA.csv"
        key_column: "geo_unit"
        value_columns:
          W: "W"
          A: "A"
          B: "B"
          M: "M"
          O: "CO"
        total_column: "total"

    fallback:
      W: 0.81
      A: 0.09
      B: 0.04
      M: 0.03
      O: 0.03

  diversity:
    type: "csv_lookup"
    description: "Household diversity probabilities (single vs mixed ethnicity)"

    files:
      - path: "data/population/ethnicity/combination_ethnicities_in_households_standardized.csv"
        key_column: "geo_unit"
        value_columns:
          single: "single_ethnicity"
          mixed_two: "two_ethnicities"
          mixed_three_plus: "three_plus_ethnicities"

    fallback:
      single: 0.85
      mixed_two: 0.12
      mixed_three_plus: 0.03

  pair_probabilities:
    type: "csv_lookup"
    description: "Conditional partner ethnicity probabilities"

    files:
      - path: "data/population/ethnicity/precomputed_area_partnerships.csv"
        key_columns: ["geo_unit", "first_ethnicity"]
        value_columns:
          W: "prob_W"
          A: "prob_A"
          B: "prob_B"
          M: "prob_M"
          O: "prob_O"

    fallback: "uniform"

# ============================================================================
# Assignment Rules by Household Structure
# ============================================================================

assignment_rules:

  # --------------------------------------------------------------------------
  # FAMILY HOUSEHOLDS (with inheritance)
  # --------------------------------------------------------------------------

  Family:
    description: "Assignment rules for family households"

    rules:
      # Primary adult: First adult, use geo distribution
      - role: "primary_adult"
        priority: 1
        assignment:
          type: "probabilistic"
          data_source: "geo_distribution"
          context: "household.geo_unit"

      # Secondary adult: Partner, use partnership probabilities
      - role: "secondary_adult"
        priority: 2
        description: "Partner assignment based on primary_adult ethnicity"
        assignment:
          type: "partnership"
          data_source: "pair_probabilities"
          context: ["household.geo_unit", "primary_adult.ethnicity"]
          fallback:
            type: "probabilistic"
            data_source: "geo_distribution"
            context: "household.geo_unit"

      # Extra adults: Independent assignment
      - role: "extra_adult"
        priority: 3
        assignment:
          type: "probabilistic"
          data_source: "geo_distribution"
          context: "household.geo_unit"

      # Children: Inherit from adults using combination rules
      - role: "children"
        priority: 4
        description: "Children inherit based on parent combination (W+W=W, W+A=M, etc.)"
        assignment:
          type: "inheritance"
          inherit_from:
            roles: ["primary_adult", "secondary_adult"]
          logic:
            # Both parents same ethnicity → child gets same ethnicity
            - when: "count(unique_adult_values) == 1"
              then: "adult_values[0]"
              note: "W+W=W, A+A=A, B+B=B, O+O=O, M+M=M"

            # Parents have different ethnicities → child is Mixed
            - when: "count(unique_adult_values) > 1"
              then: "M"
              note: "W+A=M, W+B=M, A+O=M, M+W=M, etc."

            # No parents assigned (fallback - shouldn't happen in families)
            - when: "count(adult_values) == 0"
              then:
                type: "probabilistic"
                data_source: "geo_distribution"
                context: "household.geo_unit"

      # Elderly: Reverse inheritance from primary_adult (parents of adults)
      - role: "primary_elder"
        priority: 5
        description: "First elder assigned using reverse inheritance from primary_adult"
        assignment:
          type: "reverse_inheritance"
          child_ethnicity: "primary_adult.ethnicity"
          logic:
            # For non-mixed ethnicities, both parents must be same
            - when: "primary_adult.ethnicity in ['W', 'A', 'B', 'O']"
              then: "primary_adult.ethnicity"
            # For mixed ethnicity, parents must be different - pick first parent
            - when: "primary_adult.ethnicity == 'M'"
              then:
                type: "probabilistic"
                data_source: "geo_distribution"
                context: "household.geo_unit"
                exclude: []  # Will be set to exclude secondary_elder if assigned

      - role: "secondary_elder"
        priority: 6
        description: "Second elder using reverse inheritance (must match or differ from primary_elder)"
        assignment:
          type: "reverse_inheritance"
          child_ethnicity: "primary_adult.ethnicity"
          logic:
            # For non-mixed ethnicities, must match primary_elder
            - when: "primary_adult.ethnicity in ['W', 'A', 'B', 'O']"
              then: "primary_adult.ethnicity"
            # For mixed ethnicity, must be different from primary_elder
            - when: "primary_adult.ethnicity == 'M'"
              then:
                type: "probabilistic"
                data_source: "geo_distribution"
                context: "household.geo_unit"
                exclude: ["primary_elder.ethnicity"]  # Must be different

      # Extra elderly: Independent assignment
      - role: "extra_elder"
        priority: 7
        assignment:
          type: "probabilistic"
          data_source: "geo_distribution"
          context: "household.geo_unit"

  # --------------------------------------------------------------------------
  # COUPLE HOUSEHOLDS (no inheritance)
  # --------------------------------------------------------------------------

  Couple:
    description: "Assignment rules for couple households (adult or elderly couples)"

    rules:
      # Primary adult: Use geo distribution
      - role: "primary_adult"
        priority: 1
        assignment:
          type: "probabilistic"
          data_source: "geo_distribution"
          context: "household.geo_unit"

      # Secondary adult: Use partnership probabilities
      - role: "secondary_adult"
        priority: 2
        description: "Partner assignment based on primary_adult ethnicity"
        assignment:
          type: "partnership"
          data_source: "pair_probabilities"
          context: ["household.geo_unit", "primary_adult.ethnicity"]
          fallback:
            type: "probabilistic"
            data_source: "geo_distribution"
            context: "household.geo_unit"

      # Primary elder: Use geo distribution
      - role: "primary_elder"
        priority: 1
        assignment:
          type: "probabilistic"
          data_source: "geo_distribution"
          context: "household.geo_unit"

      # Secondary elder: Use partnership probabilities
      - role: "secondary_elder"
        priority: 2
        description: "Partner assignment based on primary_elder ethnicity"
        assignment:
          type: "partnership"
          data_source: "pair_probabilities"
          context: ["household.geo_unit", "primary_elder.ethnicity"]
          fallback:
            type: "probabilistic"
            data_source: "geo_distribution"
            context: "household.geo_unit"

  # --------------------------------------------------------------------------
  # INDEPENDENTS (no inheritance, no partnership)
  # --------------------------------------------------------------------------

  Independents:
    description: "Assignment rules for independent living arrangements"

    rules:
      # Everyone assigned independently based on geo distribution
      - role: ["primary_adult", "secondary_adult", "extra_adult", "primary_elder", "secondary_elder", "extra_elder", "independent_young"]
        priority: 1
        assignment:
          type: "probabilistic"
          data_source: "geo_distribution"
          context: "household.geo_unit"

      # Children in independent households (rare but possible)
      - role: "children"
        priority: 1
        assignment:
          type: "probabilistic"
          data_source: "geo_distribution"
          context: "household.geo_unit"

# ============================================================================
# Venue Assignment Rules (Non-Household)
# ============================================================================

venue_assignment_rules:
  - venue_types: ["care_home", "boarding_school", "student_dorms"]
    description: "Simple geo-based assignment for venue residents"
    assignment:
      type: "probabilistic"
      data_source: "geo_distribution"
      context: "venue.geo_unit"

# ============================================================================
# Settings
# ============================================================================

settings:
  random_seed: null
  normalize_probabilities: true
  cache_lookups: true

  # Assignment order: Adults first, then children, then elderly
  assignment_order:
    method: "category_priority"
    category_priorities:
      "Adults": 0
      "Young Adults": 1
      "Kids": 2
      "Old Adults": 3

  # Error handling
  error_handling:
    missing_geo_unit: "use_fallback"
    missing_lookup_data: "use_fallback"
    missing_household_structure: "default_to_independents"

  # Logging
  logging:
    level: "INFO"
    detailed_assignment_logging: false
    show_samples: true
    sample_size: 10

# ============================================================================
# Ethnicity Codes
# ============================================================================

ethnicity_codes:
  W: "White"
  A: "Asian/Asian British"
  B: "Black/African/Caribbean/Black British"
  M: "Mixed/Multiple ethnic groups"
  O: "Other ethnic group"
