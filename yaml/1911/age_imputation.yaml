# ============================================================================
# Age Imputation for Students (Occode 787)
# ============================================================================

attribute:
  name: "age"
  description: "Impute missing ages for students (Occode 787)"
  assignment_level: "person"

# Filter for people who need imputation
filters:
  scholar_filter:
    attribute: "Occode"
    type: "numerical"
    numerical:
      min: 787
      max: 787

data_sources:
  student_age_dist:
    type: "csv_lookup"
    description: "Simplified observed age distribution for scholars (Occode 787)"
    # No files provided, will use fallback
    fallback:
      "5": 0.1
      "6": 0.1
      "7": 0.1
      "8": 0.1
      "9": 0.1
      "10": 0.1
      "11": 0.1
      "12": 0.1
      "13": 0.1
      "14": 0.1

assignment_rules:
  person:
    description: "Structure for person-level assignment"
    rules:
      - priority: 1
        description: "Assign age to scholars"
        role: "scholar"
        assignment:
          strategy: "probabilistic"
          data_source: "student_age_dist"
