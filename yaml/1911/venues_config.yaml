venue_types:
  household:
    enabled: true
    batch_mode: true
    filter_column: "BTCode"
    filter_values: ["C"]
    is_residence: true
    subset_categories:
      - name: "Kids"
        attribute: "age"
        type: "numerical"
        numerical:
          min: 0
          max: 17
      - name: "Young Adults"
        attribute: "age"
        type: "numerical"
        numerical:
          min: 18
          max: 24
      - name: "Adults"
        attribute: "age"
        type: "numerical"
        numerical:
          min: 25
          max: 64
      - name: "Old Adults"
        attribute: "age"
        type: "numerical"
        numerical:
          min: 65
          max: null
    
  pub:
    enabled: true
    batch_mode: true
    filter_column: "BTCode"
    filter_values: ["P"]
    is_residence: false


  school:
    enabled: true
    batch_mode: true
    filter_column: "BTCode"
    filter_values: ["S"]
    is_residence: false

  church:
    enabled: true
    batch_mode: true
    filter_column: "BTCode"
    filter_values: ["CH"]
    is_residence: false

  army_building:
    enabled: true
    batch_mode: true
    filter_column: "BTCode"
    filter_values: ["E"]
    is_residence: false

  medical:
    enabled: true
    batch_mode: true
    filter_column: "BTCode"
    filter_values: ["H"]
    is_residence: false

  prison:
    enabled: true
    batch_mode: true
    filter_column: "BTCode"
    filter_values: ["N"]
    is_residence: true
    subset_key: "resident"
