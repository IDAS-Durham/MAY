# ============================================================================
# Medieval Lord's Demesne Distributor
# ============================================================================
# Assigns serfs/villains to lord's demesne (corvée labor obligation)
# Works Thu-Fri in medieval schedule
# This runs AFTER own_land distributor (priority: 10)
# ============================================================================

distributor_name: "medieval_lords_demesne_distributor"
venue_type: "demesne"  # Venue type in venues_config.yaml
description: "Assign serfs to lord's demesne for corvée labor"

# Activity mapping
activity_map_key: "primary_activity"  # Same as own_land!
activity_type: "lords_demesne"  # ← Different type: Creates second entry under primary_activity
subset_key: "corvee_worker"

# ============================================================================
# ELIGIBILITY: Who owes corvée labor?
# ============================================================================
eligibility:
  require_unassigned: false  # ← KEY: Allow people who already have own_land!

  global_filters:
    # Social class filter (only serfs and villains owe corvée)
    - attribute: "properties.social_class"
      type: "categorical"
      description: "Only serfs and villains owe corvée labor (freemen pay rent instead)"
      values: ["serf", "villain"]

    # Age filter
    - attribute: "age"
      type: "numerical"
      description: "Medieval working age"
      min: 12
      max: 70

    # Feudal obligation filter (optional - if you track this)
    # - attribute: "properties.owes_corvee"
    #   type: "categorical"
    #   values: [true]

# ============================================================================
# VENUE SELECTION: Which demesne?
# ============================================================================
venue_selection:
  # Assign to lord's demesne based on feudal geography
  # Typically the demesne in the same manor/parish as person's village
  consider_by: "geo_unit"
  venue_geo_level: "MGU"  # Demesnes are at manor (MGU) level

  # Or use parent geo_unit traversal:
  # venue_geo_level: "MGU"  # Demesnes at MGU
  # person's SGU → parent MGU → demesne in that MGU

  # Only consider demesnes in loaded geography
  filter_by_geography: true
  respect_capacity: true

# ============================================================================
# ALLOCATION STRATEGY
# ============================================================================
allocation:
  strategy: "random"  # Or "feudal_assignment" if you implement custom matching

  # Capacity management
  capacity_column: "max_corvee_workers"  # Column in demesne CSV

  capacity_handling:
    if_missing: "ignore"
    if_zero: "skip"

  track_capacity: true
  when_full: "exclude"

# ============================================================================
# EXECUTION SETTINGS
# ============================================================================
settings:
  priority: 10  # Run AFTER own_land (priority: 20)
  max_allocations: null
  random_seed: null
  verbose: true
  log_summary: true
  debug: false

fallback:
  strategy: "skip"  # Skip if no demesnes found

# ============================================================================
# RESULT
# ============================================================================
# After running BOTH distributors (own_land + lords_demesne):
#
#   person.activity_map['primary_activity'] = {
#       'own_land': [field_subset],
#       'lords_demesne': [demesne_subset]
#   }
#
# In june2 scheduler (serf_schedule.yaml):
#   monday:
#     activity_key: "primary_activity"
#     activity_type: "own_land"  # Works on own land Mon-Wed
#
#   thursday:
#     activity_key: "primary_activity"
#     activity_type: "lords_demesne"  # Corvée labor Thu-Fri
#
# Freemen (not in eligibility) only get:
#   person.activity_map['primary_activity'] = {
#       'own_land': [field_subset]
#   }
# ============================================================================
