# ============================================================================
# School Distributor Configuration
# ============================================================================
# This distributor allocates people to schools and sets their activity_map.
# Access via: person.activity_map['primary_activity'] -> school venue
#
# Principles:
# - Generic and flexible (works with any geography/school system)
# - Respects attribute constraints (age, gender)
# - Distance-based with spatial efficiency
# - Capacity-aware allocation
# ============================================================================

# ============================================================================
# BASIC INFO
# ============================================================================
distributor_name: "school_distributor"
venue_type: "school"
description: "Distribute people to schools based on age, gender, and proximity"

# Activity mapping: This allocation sets the person's activity_map
# Access: person.activity_map['primary_activity'] will return the school Venue object
activity_map_key: "primary_activity"

# Subset to add students to
subset_key: "student"

# ============================================================================
# SPECIAL CASES: Priority allocation rules
# ============================================================================
# These rules are checked FIRST, before normal venue selection
# If a special case matches, it overrides normal allocation

special_cases:
  # --------------------------------
  # Boarding school students
  # --------------------------------
  - name: "boarding_school_students"
    description: "Students in boarding schools MUST attend the linked school"
    priority: 1  # Highest priority

    # Condition: Check if person lives in a boarding school
    condition:
      person_residence_type: "boarding_school"
      # Checks: person.residence.venue_type == "boarding_school"

    # Allocation rule: Find matching school by name AND geo_unit
    allocation_rule:
      match_by:
        - field: "name"
          source: "person.residence.name"
          target: "venue.name"
          match_type: "exact"  # Must match exactly

        - field: "geo_unit"
          source: "person.residence.geographical_unit.name"
          target: "venue.geographical_unit.name"
          match_type: "exact"

      # This is a mandatory assignment
      mandatory: true

      # What to do if no matching school found
      if_no_match: "error"  # "error", "warn", "skip", "fallback_to_normal"

# ============================================================================
# ELIGIBILITY: Who can be allocated?
# ============================================================================
# These rules determine which people are eligible for school allocation
# and which schools they can attend
# NOTE: People matched by special_cases are handled separately

eligibility:
  # Person must not already have this activity assigned
  # (prevents double-allocation)
  require_unassigned: true

  # Global eligibility filters (apply to ALL allocation phases)
  # IMPORTANT: These filters apply to Phase 1 (special cases), Phase 2 (mandatory/optional groups), AND Phase 3 (normal allocation)
  # FILTER ORDER MATTERS: More restrictive filters should come first for efficiency
  global_filters:
    # 1. Age filter (FIRST - most restrictive, filters out most people)
    - attribute: "age"
      type: "numerical"
      description: "Only consider people of school age (0-19 years)"
      min: 0
      max: 19

    # 2. Residence type filter (SECOND - only checked for people who pass age filter)
    - attribute: "residence.type"
      type: "categorical"
      description: "Only allocate people living in households or boarding schools (exclude university dorms, care homes, etc.)"
      values: ["household", "boarding_school"]

  # Exclusion rules (apply to ALL allocation phases)
  # Exclude people based on household properties
  exclude:
    households:
      original_pattern: "0 >=0 0 0"  # Exclude people from households with this pattern

  # Priority allocation groups (processed first, before normal allocation)
  # These groups are prioritized and can optionally overflow venue capacity
  priority_allocation:
    enabled: true
    priority_order: "age_desc"  # Allocate older students first (17->5)

    groups:
      # Group 1: School-age children (highest priority, can overflow)
      - name: "high_priority_school_age"
        description: "Children aged 5-17 (highest priority, can overflow capacity)"
        priority: 1  # Highest priority
        allow_overflow: true  # This makes it a 'mandatory group'. Can exceed venue capacity, but still respects age/gender constraints

        # REALISTIC SEARCH: Primary/secondary schools are plentiful, search 20-50 max
        search_limits: [20, 70]  # Try 20 closest schools, then 50, then stop

        filters:
          - attribute: "age"
            type: "numerical"
            min: 5
            max: 17

          - attribute: "residence.type"
            type: "categorical"
            description: "Only allocate people living in households or boarding schools (not university dorms)"
            values: ["household", "boarding_school"]

      # Group 2: Sixth form / Further education (second priority, respects capacity)
      - name: "second_priority_sixth_form"
        description: "Students aged 18-19 (second priority, respects capacity limits)"
        priority: 2  # Second priority
        allow_overflow: false  # Respect capacity limits

        # REALISTIC SEARCH: Sixth forms are less common, search slightly wider
        search_limits: [15, 30]  # Try 15 closest, then 30, then stop

        filters:
          - attribute: "age"
            type: "numerical"
            min: 18
            max: 19

          - attribute: "residence.type"
            type: "categorical"
            description: "Only allocate people living in households or boarding schools (not university dorms)"
            values: ["household", "boarding_school"]

      # Group 3: Early childhood (OPTIONAL - only if space available)
      - name: "optional_early_childhood"
        description: "Children under 5 (optional, third priority, only if living in household or boarding school)"
        priority: 3  # Lowest priority
        allow_overflow: false  # Respect capacity limits

        # REALISTIC SEARCH: Nurseries are VERY local - parents won't travel far with toddlers
        # Only search 8 nearest, then 10, then STOP (no searching 200+ schools!)
        search_limits: [8, 10]  # Try 8 closest nurseries, then 10, then give up

        filters:
          - attribute: "age"
            type: "numerical"
            min: 0
            max: 4

          - attribute: "residence.type"
            type: "categorical"
            description: "Only allocate people living in households or boarding schools (not university dorms)"
            values: ["household", "boarding_school"]

  # General attribute-based filtering (applies to all groups)
  attributes:
    # --------------------------------
    # Age restriction
    # --------------------------------
    - name: "age"
      type: "numerical"
      description: "Person age must fall within school's statutory age range"

      # Check against venue's CSV columns
      venue_constraints:
        min_column: "StatutoryLowAge"  # Person age >= this value
        max_column: "StatutoryHighAge"  # Person age <= this value
        # Both are INCLUSIVE ranges

      # What to do if venue columns are missing/empty
      assume_if_missing:
        min: 5   # Default minimum age
        max: 18  # Default maximum age

    # --------------------------------
    # Gender restriction
    # --------------------------------
    - name: "sex"
      type: "categorical"
      description: "Person sex must match school's gender policy"

      # Check against venue's CSV column
      venue_column: "Gender"

      # Matching rules: Maps venue value -> eligible person values
      matching_rules:
        "Mixed": ["male", "female"]     # Mixed schools accept all
        "Boys": ["male"]                 # Boys schools only accept males
        "Girls": ["female"]              # Girls schools only accept females
        "": ["male", "female"]           # Empty = assume Mixed

      # Default if venue column is missing entirely
      assume_if_missing: "Mixed"

      # Case sensitivity
      case_sensitive: false

# ============================================================================
# VENUE SELECTION: How to pick eligible venues?
# ============================================================================
# These rules determine which venues (schools) a person can choose from

venue_selection:
  # --------------------------------
  # Selection method
  # --------------------------------
  # Options:
  #   - "count": Pick N closest venues
  #   - "distance": Pick all venues within radius
  #   - "geo_unit": Only venues in person's geo_unit
  consider_by: "count"

  # Count-based parameters (when consider_by = "count")
  count: 10
  criteria: "closest"  # "closest", "random", "largest_capacity"

  # REALISTIC SEARCH LIMITS (GLOBAL FALLBACK)
  # These apply when a group doesn't specify its own search_limits
  # Each priority group above can override this with group-specific limits
  # Format: [first_try, second_try, max_try]
  #   - [20, 50] = try 20 closest schools, then 50, then stop
  #   - [8, 10] = try 8, then 10, then stop (for nurseries)
  # PERFORMANCE: This prevents searching all 25,928 schools which is absurd and slow
  search_limits: [20, 50]  # Global fallback (groups can override)

  # Distance-based parameters (when consider_by = "distance")
  # max_distance: 10
  # max_distance_unit: "km"  # "km", "miles", "meters"

  # --------------------------------
  # Geographical level configuration
  # --------------------------------
  # FLEXIBILITY: What geographical level are venues assigned to?
  # This allows the system to work when venue data is at different granularity than person data
  # If person level differs from venue level, the system will automatically traverse the hierarchy
  venue_geo_level: "SGU"  # Options: "SGU", "MGU", "LGU"
  # Examples:
  #   - "SGU": Schools usually have precise small geographical unit locations
  #   - "MGU": Some venues might only have medium geographical unit data
  #   - "LGU": Large venues (universities, hospitals) might only have large geographical unit data
  # Note: People are always at SGU level, system will traverse up to match venue level if needed

  # --------------------------------
  # Location calculation
  # --------------------------------
  # Where to measure distance FROM
  person_location_source: "geographical_unit.coordinates"
  # Options:
  #   - "geographical_unit.coordinates": Use person's geographical unit coordinates (lat/lon)
  #                                     Will automatically use the ancestor at venue_geo_level

  # Where to measure distance TO
  venue_location_source: "coordinates"
  # Options:
  #   - "coordinates": Use venue's (Latitude, Longitude) from CSV
  #   - "geo_unit.coordinates": Use venue's geographical unit centroid

  # Distance calculation method
  distance_metric: "haversine"  # "haversine" (great-circle), "euclidean"

  # --------------------------------
  # Filtering
  # --------------------------------
  # Only consider venues that exist in loaded geography
  filter_by_geography: true  # Already enforced by venues_config.yaml

  # Only consider venues with available capacity
  respect_capacity: true

# ============================================================================
# ALLOCATION STRATEGY: How to assign person to venue?
# ============================================================================
# Once we have eligible venues, how do we pick THE one?

allocation:
  # --------------------------------
  # Strategy
  # --------------------------------
  strategy: "random"
  # Options:
  #   - "random": Randomly pick from eligible venues
  #   - "closest": Always pick closest
  #   - "proportional": Weight by inverse distance (closer = higher probability)

  # --------------------------------
  # Capacity management
  # --------------------------------
  capacity_column: "SchoolCapacity"

  # What to do if capacity is missing or 0
  capacity_handling:
    if_missing: "ignore"  # "ignore" (no limit), "skip" (don't use venue), "default"
    default_capacity: 1000  # Used when if_missing = "default"
    if_zero: "ignore"  # "ignore", "skip"

  # Track capacity as we allocate
  track_capacity: true

  # What to do when venue is full
  # NOTE: This is overridden by priority_allocation.allow_overflow for priority groups
  when_full: "exclude"  # "exclude" (remove from options), "overflow" (allow over-capacity)

  # Overflow behavior for priority allocations
  overflow_behavior:
    distribute_evenly: true  # Spread overflow across all venues proportionally
    max_overflow_per_venue: null  # null = unlimited, or set a max (e.g., 1.5x capacity)

  # --------------------------------
  # Batch processing (for performance)
  # --------------------------------
  # Process people from same geo_unit together
  # Reduces spatial queries from millions to thousands
  batch_by: "geo_unit"  # "geo_unit", "none"

  # For batched allocation, use geo_unit centroid as location
  batch_location_source: "centroid"

# ============================================================================
# EXECUTION SETTINGS
# ============================================================================

settings:
  # Execution order (higher = earlier)
  priority: 10

  # Limit number of allocations (null = no limit)
  max_allocations: null

  # Logging
  verbose: true
  log_summary: true  # Print allocation statistics

  # Performance
  use_spatial_index: true  # Use KDTree for distance queries

# ============================================================================
# FALLBACK BEHAVIOR
# ============================================================================
# What to do when no eligible venues are found for a person?

fallback:
  strategy: "skip"
  # Options:
  #   - "skip": Leave person.activity_map['primary_activity'] unassigned
  #   - "relax_distance": Increase search radius and retry
  #   - "relax_capacity": Allow over-capacity allocation
  #   - "assign_closest": Assign to closest venue regardless of constraints

  # Relaxation parameters (if strategy = "relax_distance")
  relax_params:
    max_iterations: 3
    distance_multiplier: 2.0  # Double search radius each iteration

# ============================================================================
# VALIDATION & CONSTRAINTS
# ============================================================================

validation:
  # Ensure person has required attributes before attempting allocation
  required_person_attributes:
    - "age"
    - "sex"
    - "geographical_unit"  # Person's location (SGU)

  # Ensure venues have required columns
  required_venue_columns:
    - "geo_unit"
    - "Latitude"
    - "Longitude"

  # Warn if these are missing (but continue)
  optional_venue_columns:
    - "StatutoryLowAge"
    - "StatutoryHighAge"
    - "Gender"
    - "SchoolCapacity"

# ============================================================================
# NOTES
# ============================================================================
#
# ALLOCATION LOGIC:
#
# The distributor follows this multi-phase process:
#
# 1. SPECIAL CASES (Highest Priority):
#    - Boarding school students are matched to their school by name + geo_unit
#    - Example: Student in "Harrow School" boarding_school residence
#              → Assigned to "Harrow School" venue in same geo_unit
#    - This is MANDATORY - if no match found, raises error
#
# 2. MANDATORY ALLOCATION (School-age children MUST be allocated):
#    - Group 1: Ages 5-17 (MANDATORY, allows overflow)
#      → Allocated oldest-first (17 down to 5)
#      → Can exceed school capacity if necessary
#      → BUT: Still respects age/gender constraints
#      → Only allocated to schools that accept their age range
#    - Group 2: Ages 18-19 (OPTIONAL, second priority)
#      → Sixth form / further education students
#      → Only allocated if space available after Group 1
#      → Respects school capacity limits
#    - Group 3: Ages 0-4 (OPTIONAL, third priority)
#      → Early childhood students
#      → Only allocated if space available after Groups 1 & 2
#      → Respects school capacity limits
#
# 3. NORMAL ALLOCATION (For remaining people):
#    - Find 5 closest schools within constraints (age, gender)
#    - Randomly select one from these 5
#    - Respect capacity limits
#    - Use haversine distance from residence geo_unit to school lat/lon
#
# MANDATORY ALLOCATION DETAILS:
#    - Ages 5-17 are prioritized and GUARANTEED allocation IF suitable schools exist
#    - "allow_overflow" means can exceed school capacity, but NOT break age/gender rules
#    - Students will ONLY be allocated to schools that accept their age range
#    - If no suitable schools exist (e.g., age 17 but only primary schools available),
#      student will remain unallocated and a warning will be logged
#    - Optional groups allocated in priority order:
#      1. Ages 18-19 (sixth form, if space available)
#      2. Ages 0-4 (early childhood, if space available)
#    - System checks and warns if any mandatory students are unallocated
#
# GLOBAL FILTER PRIORITY:
#    - Filters are checked in order: age → residence type → exclusions
#    - Age filter (0-19) is FIRST to eliminate most ineligible people efficiently
#    - Residence type filter is SECOND (only checked for people who pass age)
#    - This order minimizes unnecessary checks and reduces log noise
#    - Example: A 50-year-old in a care home is filtered by age, never checks residence
#
# EXCLUSION RULES:
#    - The 'exclude' section filters people BEFORE any allocation happens
#    - Supports filtering by household properties (stored in household.properties dict)
#    - Example: exclude.households.original_pattern = "0 >=0 0 0"
#      → Excludes all people living in households with that specific pattern
#    - This is applied to ALL phases (special cases, mandatory, and normal allocation)
#    - Use this to exclude specific household types from school allocation
#
# EXAMPLE USAGE IN CODE:
#
#   from distributors import Distributor
#
#   distributor = Distributor.from_yaml("yaml/distributors/school_distributor.yaml")
#   distributor.allocate(world)
#
#   # Access allocated school:
#   for person in world.people:
#       if 'primary_activity' in person.activity_map:
#           school = person.activity_map['primary_activity']
#           print(f"{person.name} goes to {school.name}")
#
# BOARDING SCHOOL WORKFLOW:
#   1. Allocate students to boarding_school venues (as residence) in allocation_strategy.yaml
#   2. Run school_distributor to set primary_activity
#   3. Boarding students get matched to school by name+geo_unit
#   4. Regular students get allocated by distance
#
# ============================================================================
