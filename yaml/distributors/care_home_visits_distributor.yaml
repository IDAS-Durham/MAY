# Care Home Visits Distributor Configuration
# Replicates JUNE 1 leisure linking of households to care homes.

distributor_name: "care_home_visits_distributor"
distributor_type: "resident_linked"

# Target configuration
target_venue_type: "care_home"
resident_subset: "resident"
subset_key: "visitor"

# Activity mapping
activity_map_key: "leisure"

# Linking logic
link_level: "household"
multiplier: 1  # 1 household per resident
geography_level: "MGU"  # Corrected to Middle Geographical Unit

# Visitor Eligibility
visitor_eligibility:
  global_filters:
    # Must be a standard residential household
    - attribute: "residence.type"
      value: "household"
      type: "categorical"
    
    # Target specific composition types that match JUNE 1 logic
    # using MAY pattern strings
    - attribute: "residence.properties.original_pattern"
      values: 
        # Families with kids
        - ">=2 >=0 2 0"
        - "1 >=0 2 0"
        - ">=2 >=0 1 0"
        - "1 >=0 1 0"
        # Households with Young Adults
        - "0 >=1 2 0"
        - "0 >=1 1 0"
        # Adult-only households (No kids)
        - "0 0 2 0"
        - "0 0 0 2"
      type: "categorical"

# Settings
settings:
  verbose: true
  batch_geo_level: "MGU"
