# ============================================================================
# Work Sector Attribute Assignment Configuration
# ============================================================================
# Assigns work sector (industry) based on:
# 1. Workplace LGU location (not residence)
# 2. Person's sex (for demographic realism)
#
# Uses LGU + Sex stratification for statistically reliable probabilities
# while workplace_sgu provides spatial precision.
#
# Assignment Level: person
# Dependencies: workplace_location (LGU), workplace_sgu (SGU)
# ============================================================================

attribute:
  name: "work_sector"
  description: "Assigns industry sector based on workplace LGU and sex"
  data_type: "categorical"
  assignment_level: "person"

# ============================================================================
# Filters - Only assign to working-age people (18-65)
# ============================================================================
filters:
  age:
    attribute: "age"
    type: "numerical"
    description: "Working age population"
    numerical:
      min: 18
      max: 65

# ============================================================================
# Required Attributes (Dependencies)
# ============================================================================
required_attributes:
  - name: "workplace_location"
    description: "Workplace LGU must be assigned first"
    required: true
    error_if_missing: true
  - name: "workplace_sgu"
    description: "Workplace SGU must be assigned first"
    required: true
    error_if_missing: true

# ============================================================================
# Data Sources
# ============================================================================
data_sources:
  # Workplace LGU + Sex stratified industry distribution
  workplace_industry_by_sex:
    type: "csv_lookup"
    description: "Industry distribution by workplace LGU and sex for demographic accuracy"

    files:
      - path: "data/activities/work/EW_industry_sex_lad.csv"

        # Multi-key lookup: LGU name + Sex
        key_columns:
          LGU_name:
            attribute: "workplace_location"
            type: "direct"  # From person.properties["workplace_location"]

          Sex:
            attribute: "sex"
            type: "direct"  # From person.sex

        # Value columns: 18 industry sectors (exact CSV column names)
        value_columns:
          agriculture: "Agriculture; Forestry; Fishing"
          mining: "Mining and Quarrying"
          manufacturing: "Manufacturing"
          electricity: "Electricity, Gas, Steam and Air Conditioning Supply"
          water: "Water Supply; Sewage; Waste Management and Remediation activities"
          construction: "Construction"
          retail: "Wholesale and Retail trade; Repair of Motor Vehicles and Motorcycles"
          transport: "Transport and Storage"
          accommodation: "Accommodation and Food Service Activities"
          information: "Information and Communication"
          finance: "Financial and Insurance Activities"
          real_estate: "Real Estate Activities"
          professional: "Professional Scientific and Technical Activities"
          admin: "Administrative and Support Service Activities"
          public_admin: "Public Administration and Defence; Compulsory Social Security"
          education: "Education"
          health: "Human Health and Social Work Activities"
          other: "Other"

    fallback:
      # National fallback (approximate UK 2021 employment distribution)
      agriculture: 0.01
      mining: 0.002
      manufacturing: 0.08
      electricity: 0.005
      water: 0.007
      construction: 0.07
      retail: 0.15
      transport: 0.05
      accommodation: 0.07
      information: 0.045
      finance: 0.035
      real_estate: 0.02
      professional: 0.09
      admin: 0.08
      public_admin: 0.045
      education: 0.09
      health: 0.13
      other: 0.04

# ============================================================================
# Assignment Rules (Person-Level)
# ============================================================================
assignment_rules:
  person:
    description: "Assign work sector based on workplace LGU + sex"

    rules:
      - description: "Probabilistic sector assignment stratified by LGU and sex"
        priority: 1

        assignment:
          strategy: "categorical_sampler"  # Sample ONE category from probabilities
          data_source: "workplace_industry_by_sex"

# ============================================================================
# Settings
# ============================================================================
settings:
  random_seed: null
  normalize_probabilities: true
  cache_lookups: true

  error_handling:
    missing_geo_unit: "use_fallback"
    missing_lookup_data: "use_fallback"
    person_without_work_activity: "skip_person"
    missing_filter_activity: "skip_person"

  logging:
    level: "INFO"
    detailed_assignment_logging: false
    show_samples: true
    sample_size: 10

# ============================================================================
# Industry Sector Labels (for reference)
# ============================================================================
sector_labels:
  agriculture: "Agriculture, Forestry, and Fishing"
  mining: "Mining and Quarrying"
  manufacturing: "Manufacturing"
  electricity: "Electricity, Gas, Steam and Air Conditioning Supply"
  water: "Water Supply, Sewage, Waste Management and Remediation"
  construction: "Construction"
  retail: "Wholesale and Retail Trade, Motor Vehicle Repair"
  transport: "Transport and Storage"
  accommodation: "Accommodation and Food Service Activities"
  information: "Information and Communication"
  finance: "Financial and Insurance Activities"
  real_estate: "Real Estate Activities"
  professional: "Professional, Scientific and Technical Activities"
  admin: "Administrative and Support Service Activities"
  public_admin: "Public Administration and Defence, Compulsory Social Security"
  education: "Education"
  health: "Human Health and Social Work Activities"
  other: "Other Services"
